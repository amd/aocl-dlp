  # N=192: nr(48)=4 -> jc=4,ic=2 or jc=8,ic=1 -> perfect split
  # N=384: nr(48)=8 -> jc=8,ic=1 -> perfect 1 panel/thread
  # vs 6x64 where nr(64)=3 or 6 -> poor jc-division

