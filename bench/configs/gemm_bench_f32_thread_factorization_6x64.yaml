# Thread factorization stress test: data points where MR=6, NR=64
# underperforms vs MR=8, NR=48 due to thread utilization issues.
#
# Two mechanisms:
#
# A) mrxnr fast-path thread truncation (ic_ways = mr_blks, nt truncated)
#    Root cause: the mrxnr fast path sets ic_ways = ceil(M/MR), then
#    jc_ways = floor(nt / ic_ways), n_threads = ic_ways * jc_ways.
#    MR=6 produces non-power-of-2 mr_blks => nt % mr_blks > 0 => waste.
#
# B) N-panel load imbalance at low thread counts
#    NR=64 produces fewer N-panels than NR=48 for the same N, leading to
#    worse distribution across jc_ways threads. Both configs use all threads,
#    but work is unevenly split.
#
# =====================================================================
# Section 1: 128-thread mrxnr truncation (Mechanism A)
# =====================================================================
#
# Waste breakdown (128 threads):
#   5 threads wasted: M in [241..246], mr_blks=41 (prime), 128 = 41*3 + 5
#   4 threads wasted: M in [181..186], mr_blks=31 (prime), 128 = 31*4 + 4
#   4 threads wasted: M in [367..372], mr_blks=62,          128 = 62*2 + 4
#   3 threads wasted: M in [25..30],   mr_blks=5,           128 = 5*25 + 3
#   2 threads wasted: M in [31..36],   mr_blks=6,           128 = 6*21 + 2
#   2 threads wasted: M in [121..126], mr_blks=21,          128 = 21*6 + 2
#   2 threads wasted: M in [247..252], mr_blks=42,          128 = 42*3 + 2

