  # =====================================================================
  # Section 2: 8-thread N-panel load imbalance (Mechanism B)
  # =====================================================================
  #
  # With 8 threads, both configs use all 8 threads (2x2 path), but
  # NR=64 creates fewer N-panels than NR=48, causing uneven jc splits.
  #
  # Key examples (ic=1, jc=8 for both):
  #   N=192: nr_blks(64)=3, 3/8 -> 5 idle;  nr_blks(48)=4, 4/8 -> 4 idle
  #   N=256: nr_blks(64)=4, 4/8 -> 100% waste; nr_blks(48)=6, 6/8 -> 33%
  #   N=576: nr_blks(64)=9, 9/8 -> 78% waste;  nr_blks(48)=12, 12/8 -> 33%
  #   N=640: nr_blks(64)=10, 10/8 -> 60% waste; nr_blks(48)=14, 14/8 -> 14%
  #
  # Also: M in [13..18] with N=128 triggers mrxnr truncation (6->8 waste=2)

  # ---- N-panel imbalance: N=192 (nr=3 vs 4) ----
  # 6x64: ceil(192/64)=3 panels across 8 jc-threads -> 167% N-waste
  # 8x48: ceil(192/48)=4 panels across 8 jc-threads -> 100% N-waste

  - name: "8t_panel_imbalance_N192"
    a_type: "f32"
    b_type: "f32"
    c_type: "f32"
    acc_type: "f32"
    storage_format: "row-major"
    transA: false
    transB: false
    m: [25, 30, 32, 36, 48, 64]
    n: [192]
    k: [768, 1024]
    alpha: 1.0
    beta: 0.0
    mtagA: "none"
    mtagB: "reorder"
    tolerances:
      float: 1.0e-5
    product_type: "cartesian"

