# GEMM benchmarking configuration file
gemm_tests:
  # exhaustive test cases generated using cartesian product of inputs
  - name: "mixed_size_matrix"
    a_type: ["f32"]
    b_type: ["f32"]
    c_type: ["f32"]
    acc_type: ["f32"]
    storage_format: ["row-major"]
    transA: [false, true]
    transB: [true]
    # Non optional
    m: [1, 64, 256, 1000]
    n: [1, 64, 256, 1000]
    k: [1, 64, 256, 1000]
    alpha: [2.5, 0, -2.5]
    beta: [2.5, 0, -2.5]
    # Optional Params
    lda: 1000
    ldb: 1000
    ldc: 1000
    mtagA: ["none","pack"]
    mtagB: ["reorder","pack","none"]   # Matrix B reordering can improve performance
    tolerances:
      relative: 100.0
      absolute: 50.0
    product_type: cartesian
