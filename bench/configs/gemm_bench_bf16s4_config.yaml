# GEMM benchmarking configuration file for BF16S4 operations
# BF16 (bfloat16) x S4 (4-bit signed integer) matrix multiplication
# This configuration supports weight-only quantization (WOQ) scenarios
# ==============================================================================
# Target: Comprehensive benchmarking for bf16s4 GEMM implementations
# Input Types: A=bf16, B=s4 (4-bit quantized weights)
# Output Types: f32, bf16
# Accumulator: f32
#
# Test Coverage:
#   - Small matrices: Basic functionality verification
#   - Medium matrices: Realistic workloads
#   - Large matrices: Performance critical sizes
#   - Token-based tests: Common LLM inference scenarios (16, 32, 64, 128, 256, 512, 1024 tokens)
#   - Specific requirements: M >= 64 with N,K >= 1024; M=32 with high N,K
#   - WOQ quantization: Per-tensor and per-channel quantization
# ==============================================================================

gemm_tests:
  # ==========================================================================
  # SMALL MATRICES - Edge case testing
  # ==========================================================================

  # Test 1: Small matrices - Edge cases
  - name: "bf16s4f32of32_small"
    a_type: "bf16"
    b_type: "s4"
    c_type: "f32"
    acc_type: "f32"
    storage_format: "row-major"
    transA: false
    transB: false
    # Small dimensions to test fringe kernels
    m: [1, 8, 16, 32]
    n: [32, 64]
    k: [32, 64]
    alpha: [1.0]
    beta: [0.0]
    lda: 64
    ldb: 64
    ldc: 64
    mtagA: ["none"]
    mtagB: ["reorder"]
    pre_operations:
      cartesian: false
      operations:
        - type: "WOQ"
          params:
            scale_factor_len: ["1"]
            scale_factor_type: ["f32"]
            zero_point_len: ["1"]
            zero_point_type: ["f32"]
    post_operations:
      cartesian: false
      operations:
        - type: "Elementwise-RELU"
          params:
            alpha_type: ["f32"]
            alpha: 1
    tolerances:
      relative: 125.0
      absolute: 50.0
    product_type: "cartesian"

  # ==========================================================================
  # MEDIUM MATRICES - Performance testing
  # ==========================================================================

  # Test 2: Medium matrices
  - name: "bf16s4f32of32_medium"
    a_type: "bf16"
    b_type: "s4"
    c_type: "f32"
    acc_type: "f32"
    storage_format: "row-major"
    transA: false
    transB: false
    # Medium sizes for realistic workloads
    m: [64, 128, 256, 512]
    n: [256, 512, 1024]
    k: [256, 512, 1024]
    alpha: [1.0]
    beta: [0.0]
    lda: 1024
    ldb: 1024
    ldc: 1024
    mtagA: ["none"]
    mtagB: ["reorder"]
    pre_operations:
      cartesian: false
      operations:
        - type: "WOQ"
          params:
            scale_factor_len: ["1"]
            scale_factor_type: ["f32"]
            zero_point_len: ["1"]
            zero_point_type: ["f32"]
    tolerances:
      relative: 100.0
      absolute: 50.0
    product_type: "cartesian"

  # ==========================================================================
  # LARGE MATRICES - Throughput testing
  # ==========================================================================

  # Test 3: Large matrices
  - name: "bf16s4f32of32_large"
    a_type: "bf16"
    b_type: "s4"
    c_type: "f32"
    acc_type: "f32"
    storage_format: "row-major"
    transA: false
    transB: false
    # Large dimensions for throughput testing
    m: [1024, 2048, 4096]
    n: [2048, 4096, 8192]
    k: [2048, 4096, 8192]
    alpha: [1.0]
    beta: [0.0]
    lda: 8192
    ldb: 8192
    ldc: 8192
    mtagA: ["none"]
    mtagB: ["reorder"]
    pre_operations:
      cartesian: false
      operations:
        - type: "WOQ"
          params:
            scale_factor_len: ["1"]
            scale_factor_type: ["f32"]
            zero_point_len: ["1"]
            zero_point_type: ["f32"]
    tolerances:
      relative: 100.0
      absolute: 50.0
    product_type: "cartesian"

  # ==========================================================================
  # TOKEN-BASED TESTS - LLM Inference Scenarios
  # ==========================================================================

  # Test 4: Token counts (input tokens: 16, 32, 64, 128, 256, 512, 1024)
  - name: "bf16s4f32of32_token_counts"
    a_type: "bf16"
    b_type: "s4"
    c_type: "f32"
    acc_type: "f32"
    storage_format: "row-major"
    transA: false
    transB: false
    # M represents token counts
    m: [16, 32, 64, 128, 256, 512, 1024]
    # N and K represent model dimensions (typical LLM sizes)
    n: [2048, 4096, 8192]
    k: [2048, 4096, 8192]
    alpha: [1.0]
    beta: [0.0]
    lda: 8192
    ldb: 8192
    ldc: 8192
    mtagA: ["none"]
    mtagB: ["reorder"]
    pre_operations:
      cartesian: false
      operations:
        - type: "WOQ"
          params:
            scale_factor_len: ["1"]
            scale_factor_type: ["f32"]
            zero_point_len: ["1"]
            zero_point_type: ["f32"]
    tolerances:
      relative: 100.0
      absolute: 50.0
    product_type: "cartesian"

  # Test 5: M >= 64, N >= 1024, K >= 1024
  - name: "bf16s4f32of32_m64_large_nk"
    a_type: "bf16"
    b_type: "s4"
    c_type: "f32"
    acc_type: "f32"
    storage_format: "row-major"
    transA: false
    transB: false
    # M >= 64
    m: [64, 128, 256, 512, 1024]
    # N >= 1024
    n: [1024, 2048, 4096]
    # K >= 1024
    k: [1024, 2048, 4096]
    alpha: [1.0]
    beta: [0.0]
    lda: 4096
    ldb: 8192
    ldc: 8192
    mtagA: ["none"]
    mtagB: ["reorder"]
    pre_operations:
      cartesian: false
      operations:
        - type: "WOQ"
          params:
            scale_factor_len: ["n"]
            scale_factor_type: ["f32"]
            zero_point_len: ["n"]
            zero_point_type: ["f32"]
    tolerances:
      relative: 100.0
      absolute: 50.0
    product_type: "cartesian"

  # Test 6: M = 32, Higher N and K (N > 3072) when N <= K
  - name: "bf16s4f32of32_m32_high_nk"
    a_type: "bf16"
    b_type: "s4"
    c_type: "f32"
    acc_type: "f32"
    storage_format: "row-major"
    transA: false
    transB: false
    # Fixed M = 32
    m: [32]
    # N > 3072, with N <= K constraint
    n: [4096, 6144, 8192]
    k: [4096, 6144, 8192, 10240, 12288]
    alpha: [1.0]
    beta: [0.0]
    lda: 12288
    ldb: 12288
    ldc: 12288
    mtagA: ["none"]
    mtagB: ["reorder"]
    pre_operations:
      cartesian: false
      operations:
        - type: "WOQ"
          params:
            scale_factor_len: ["n"]
            scale_factor_type: ["f32"]
            zero_point_len: ["n"]
            zero_point_type: ["f32"]
    tolerances:
      relative: 100.0
      absolute: 50.0
    product_type: "cartesian"

  # ==========================================================================
  # EDGE CASES - Prime dimensions for kernel selection stress testing
  # ==========================================================================

  # Test 7: Kernel selection stress test with prime dimensions
  - name: "bf16s4f32of32_edge_cases"
    a_type: "bf16"
    b_type: "s4"
    c_type: "f32"
    acc_type: "f32"
    storage_format: "row-major"
    transA: false
    transB: false
    # Prime and irregular dimensions
    m: [3, 7, 13, 23, 31]
    n: [11, 31, 47]
    k: [11, 31, 47]
    alpha: [1.0]
    beta: [0.0]
    lda: 64
    ldb: 64
    ldc: 64
    mtagA: ["none"]
    mtagB: ["reorder"]
    pre_operations:
      cartesian: false
      operations:
        - type: "WOQ"
          params:
            scale_factor_len: ["1"]
            scale_factor_type: ["f32"]
            zero_point_len: ["1"]
            zero_point_type: ["f32"]
    tolerances:
      relative: 100.0
      absolute: 50.0
    product_type: "cartesian"
