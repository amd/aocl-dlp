# AOCL-DLP Docker Development Environment Configuration

# Base image configuration
base_image:
  name: "ubuntu"
  tag: "25.04"

# Container configuration
container:
  name: "aocl-dlp-dev"
  privileged: true

# Network configuration
network:
  ssh_port: 8022

# Package installation
packages:
  system:
    - lcov
    - gcc
    - cmake
    - ninja-build
    - git
    - clang
    - libomp-dev
    - openssh-server
    - sudo
    - curl
    - wget
    - vim
    - nano
    - htop
    - build-essential
    - gdb
    - valgrind
    - python3
    - python3-pip

# Volume configuration
volumes:
  workspace_mount: "/workspace"

# SSH configuration
ssh:
  enabled: true
  port: 22
  allow_root: true
  password_auth: false
  key_auth: true

# Build configuration
build:
  pull_base_image: true
  use_buildx: true
  cache_from: "type=local,src=/tmp/.buildx-cache"
  cache_to: "type=local,dest=/tmp/.buildx-cache"

# Runtime configuration
runtime:
  auto_remove_existing: true
  working_directory: "/workspace"
  environment_vars:
    - "TERM=xterm-256color"
    - "DEBIAN_FRONTEND=noninteractive"
