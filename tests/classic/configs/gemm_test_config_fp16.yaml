# Exhaustive GEMM test configuration for FP16 JIT implementation
# This configuration thoroughly tests all critical paths, edge cases, and kernel variants

# THIS CONFIG IS ONLY FOR EXHAUSTIVE TESTING
# NOTE : UPDATE THE TEST GEMM LIMIT TO 500000 BEFORE RUNNING

gemm_tests:
  # =============================================================================
  # KERNEL VARIANT MATRIX TESTING - All 6 generated kernels (MR=6, NR=128)
  # FP16 Zen4 block sizes: MC=288, NC=1024, KC=2048, MR=6, NR=128
  # =============================================================================

  # 0a : MR variants (1-6) × NR=128
  - name: "fp16_kernel_matrix_mr_nr_set1"
    a_type: ["fp16"]
    b_type: ["fp16"]
    c_type: ["fp16"]
    acc_type: ["fp16"]
    storage_format: ["row-major"]
    transA: [false, true]
    transB: [false, true]
    # MR variants: 1,2,3,4,5,6 (all possible M remainders + full MR=6)
    m: [2, 3, 4, 5, 6, 7, 8, 11, 12, 13, 17, 18, 23, 24, 30, 36, 42, 48]
    # NR=128 for FP16 (4 ZMMs × 32 fp16 elements = 128 per NR block)
    # Test: NR fringe cases and full NR boundaries
    n: [2, 3, 7, 8, 15, 16, 31, 32, 33, 63, 64, 65, 95, 96, 127, 128, 129, 256]
    k: [1, 2, 4, 8, 16, 32, 64, 128, 256, 512]
    alpha: [2]
    beta: [2]
    lda: [2056]
    ldb: [2056]
    ldc: [2056]
    mtagA: ["none", "pack"]
    mtagB: ["none", "reorder"]
    tolerances:
      absolute: 50
      relative: 50

  # =============================================================================
  # K DIMENSION TESTING - No VNNI alignment needed for FP16
  # =============================================================================
  - name: "fp16_k_dimension"
    a_type: ["fp16"]
    b_type: ["fp16"]
    c_type: ["fp16"]
    acc_type: ["fp16"]
    storage_format: ["row-major"]
    transA: [false]
    transB: [false]
    m: [6, 12, 18]
    n: [32, 64, 96]
    # K values - FP16 has no VNNI alignment requirement
    k: [1, 2, 3, 4, 5, 7, 8, 9, 15, 16, 17, 31, 32, 33, 63, 64, 65, 127, 128, 129, 255, 256, 257]
    alpha: [2]
    beta: [2]
    lda: [300]
    ldb: [300]
    ldc: [300]
    mtagA: ["none", "pack"]
    mtagB: ["none", "reorder"]
    tolerances:
      absolute: 50
      relative: 50

  # =============================================================================
  # STRIDE VERIFICATION - Critical for memory access correctness
  # =============================================================================

  - name: "fp16_stride_verification"
    a_type: ["fp16"]
    b_type: ["fp16"]
    c_type: ["fp16"]
    acc_type: ["fp16"]
    storage_format: ["row-major"]
    transA: [false]
    transB: [false]
    m: [6, 12]  # Test both single and multiple M blocks
    n: [2, 16, 17, 32, 33, 64, 65, 96, 127, 128, 129, 256]  # Critical N boundaries (NR=128)
    k: [8, 16, 32, 64, 128]
    alpha: [2]
    beta: [2]
    # Varied stride combinations
    lda: [8, 16, 32, 64, 77, 128, 256]
    ldb: [32, 64, 77, 128, 256, 300]
    ldc: [32, 64, 77, 128, 256, 300]
    mtagA: ["none", "pack"]
    mtagB: ["none", "reorder"]
    tolerances:
      absolute: 50
      relative: 50

  # =============================================================================
  # N FRINGE MASKING - Mask kernel testing for N % 128 (NR=128)
  # The N-fringe occurs when N is not a multiple of NR=128.
  # Split into sets covering the full 1-127 fringe range.
  # =============================================================================

  - name: "fp16_n_fringe_masking_set1"
    a_type: ["fp16"]
    b_type: ["fp16"]
    c_type: ["fp16"]
    acc_type: ["fp16"]
    storage_format: ["row-major"]
    transA: [false]
    transB: [false]
    m: [2, 3, 4, 5, 6]  # All MR variants
    # nRemainder cases (1-31): first quarter of NR=128 fringe range
    n: [1, 2, 3, 7, 8, 9, 15, 16, 17, 23, 24, 25, 31]
    k: [1, 4, 8, 9, 16, 17, 32, 64]
    alpha: [1.0, 2.5]
    beta: [0.0, 1.5]
    lda: [140, 200]
    ldb: [140, 200]
    ldc: [140, 200]
    mtagA: ["none", "pack"]
    mtagB: ["none", "reorder"]
    tolerances:
      absolute: 10
      relative: 10

  - name: "fp16_n_fringe_masking_set2"
    a_type: ["fp16"]
    b_type: ["fp16"]
    c_type: ["fp16"]
    acc_type: ["fp16"]
    storage_format: ["row-major"]
    transA: [false]
    transB: [false]
    m: [2, 3, 4, 5, 6]  # All MR variants
    # nRemainder cases (32-63): second quarter of NR=128 fringe range
    n: [32, 33, 39, 47, 48, 49, 55, 63]
    k: [1, 4, 8, 9, 16, 17, 32, 64]
    alpha: [1.0, 2.5]
    beta: [0.0, 1.5]
    lda: [140, 200]
    ldb: [140, 200]
    ldc: [140, 200]
    mtagA: ["none", "pack"]
    mtagB: ["none", "reorder"]
    tolerances:
      absolute: 10
      relative: 10

  - name: "fp16_n_fringe_masking_set3"
    a_type: ["fp16"]
    b_type: ["fp16"]
    c_type: ["fp16"]
    acc_type: ["fp16"]
    storage_format: ["row-major"]
    transA: [false]
    transB: [false]
    m: [2, 3, 4, 5, 6]  # All MR variants
    # nRemainder cases (64-127): upper half of NR=128 fringe range
    n: [64, 65, 71, 79, 80, 81, 95, 96, 97, 111, 112, 113, 126, 127]
    k: [1, 4, 8, 9, 16, 17, 32, 64]
    alpha: [1.0, 2.5]
    beta: [0.0, 1.5]
    lda: [140, 200]
    ldb: [140, 200]
    ldc: [140, 200]
    mtagA: ["none", "pack"]
    mtagB: ["none", "reorder"]
    tolerances:
      absolute: 10
      relative: 10

  # =============================================================================
