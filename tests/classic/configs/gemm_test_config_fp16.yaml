    n: [128, 256, 384, 512]
    k: [1, 8, 16, 32, 64, 128, 256]
    alpha: [2]
    beta: [0.0, 1.0]
    lda: [64, 128, 256, 512]
    ldb: [64, 128, 256, 512]
    ldc: [64, 128, 256, 512]
    mtagA: ["none", "pack"]
    mtagB: ["none", "reorder"]
    tolerances:
