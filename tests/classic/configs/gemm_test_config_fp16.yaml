    acc_type: ["fp16"]
    storage_format: ["row-major"]
    transA: [false]
    transB: [false]
    m: [6, 12, 17, 21]
    # N values that trigger both nFullpieces>0 AND nRemainder>0 (NR=128)
    # nFullpieces = N / 128, nRemainder = N % 128
    n: [129, 130, 159, 191, 192, 193, 255, 256, 257, 383, 384, 385]
    k: [8, 16, 32, 64, 128]
    alpha: [1.0, 2.0]
    beta: [0.0, 1.0, 2.0]
    lda: [200, 300]
    ldb: [200, 300]
    ldc: [200, 300]
    mtagA: ["none", "pack"]
    mtagB: ["none", "reorder"]
