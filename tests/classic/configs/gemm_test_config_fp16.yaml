  # ==========================================================================
  # Special Floating-Point Values: NaN and Infinity
  # ==========================================================================
  # BLAS spec requires:
  #   - beta=0: C must NOT be read (prevents 0*NaN=NaN propagation)
  #   - alpha=0: A*B product must be skipped (prevents Inf*0=NaN)
  #   - alpha=0, beta=0: C = 0 (all zeros, regardless of input)
  # ==========================================================================

  - name: "fp16_special_values_nan_inf"
    a_type: ["fp16"]
    b_type: ["fp16"]
    c_type: ["fp16"]
    acc_type: ["fp16"]
    storage_format: ["row-major", "column-major"]
    transA: [false]
    transB: [false]
    m: [6, 12]
    n: [64, 128]
    k: [64]
    alpha: [1.0]
    beta: [0.0, 1.0]
    mtagA: ["none"]
    mtagB: ["none"]
    fill_pattern:
      - type: "static"
        values: [.NaN]
        apply_matrix: ["C"]
      - type: "static"
        values: [.inf]
        apply_matrix: ["A", "B"]
    tolerances:
      absolute: 0
      relative: 0

  - name: "fp16_special_values_alpha_zero"
