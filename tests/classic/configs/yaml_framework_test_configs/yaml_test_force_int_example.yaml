# Example YAML configuration demonstrating force_int_distribution feature
# This file shows practical examples of using the feature

gemm_tests:
  # Example 1: Integer stress testing (default behavior)
  # Use this for deterministic, reproducible tests with integral values
  - name: "integer_stress_test"
    a_type: ["f32"]
    b_type: ["f32"]
    c_type: ["f32"]
    acc_type: ["f32"]
    storage_format: ["row-major"]
    transA: [false]
    transB: [false]
    m: 128
    n: 128
    k: 128
    alpha: 1.0
    beta: 0.0
    mtagA: ["none"]
    mtagB: ["none"]
    tolerances:
      absolute: 0
      relative: 0
    fill_value:
      lb: -5.0
      ub: 5.0
      dist: "uniform"
      force_int_distribution: true  # Generates only integer values: -5, -4, -3, ..., 4, 5

  # Example 2: Real-world floating-point testing
  # Use this when you need realistic fractional values
  - name: "realistic_float_test"
    a_type: ["f32"]
    b_type: ["f32"]
    c_type: ["f32"]
    acc_type: ["f32"]
    storage_format: ["row-major"]
    transA: [false]
    transB: [false]
    m: 128
    n: 128
    k: 128
    alpha: 1.0
    beta: 0.0
    mtagA: ["none"]
    mtagB: ["none"]
    tolerances:
      absolute: 1
      relative: 1
    fill_value:
      lb: -1.5
      ub: 1.5
      dist: "uniform"
      force_int_distribution: false  # Generates real values including fractions

  # Example 3: BF16 with integer distribution
  # Useful for testing bfloat16 quantization with integral inputs
  - name: "bf16_integer_test"
    a_type: ["bf16"]
    b_type: ["bf16"]
    c_type: ["bf16"]
    acc_type: ["f32"]
    storage_format: ["row-major"]
    transA: [false]
    transB: [false]
    m: 64
    n: 64
    k: 64
    alpha: 1.0
    beta: 0.0
    mtagA: ["none"]
    mtagB: ["none"]
    tolerances:
      absolute: 0
      relative: 0
    fill_value:
      lb: -3.0
      ub: 3.0
      dist: "uniform"
      force_int_distribution: true
