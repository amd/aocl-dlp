# GEMM test configuration file
yaml_test:
  # Basic test cases
  - name: "small_matrix"
    a_type: ["f32"]
    b_type: ["f32"]
    c_type: ["f32"]
    acc_type: ["f32"]
    storage_format: ["row-major"]
    transA: [false, true]
    transB: [true]
    # Non optional
    m:
      lb: 10
      ub: 20
      step: 5
    n:
      lb: 10
      ub: 10
      step: -1
    k:
      lb: 10
      ub: 10
      step: -1
    alpha: [2.5, 0, -2.5]
    beta: [2.5, 0, -2.5]
    # Optional Params
    lda: [10, 20, 30]
    ldb:
      lb: 10
      ub: 10
      step: -1
    ldc: 10
    mtagA: "none"    # Default none
    mtagB: "reorder" # Matrix B reordering can improve performance
    tolerances:
      absolute: 50
      relative: 50
    post_operations:
      cartesian: true
      operations:
        # Element-wise operations - all supported types
        - type: "Elementwise-SIGMOID"
        # Scale operations (quantization)
        - type: "Scale"
          params:
            scale_factor_len: ["n", "1"]
            scale_factor_type: ["f32"]
        - type: "Scale"
          params:
            scale_factor_type: ["f32", "bf16"]
        # Bias operation
        - type: "Bias"
          params:
            bias_type: ["f32", "bf16", "s8"]
            bias_dim: ["n", "1"]
        # Matrix operations (use C matrix dimensions automatically)
        - type: "Matrix-Add"
        - type: "Matrix-Mul"
  - name: "medium_matrix"
    a_type: ["f32"]
    b_type: ["f32"]
    c_type: ["f32"]
    acc_type: ["f32"]
    storage_format: ["row-major"]
    transA: [false, true]
    transB: [true, false]
    # Non optional
    m:
      lb: 256
      ub: 1024
      step: 64
    n:
      lb: 256
      ub: 1024
      step: 64
    k:
      lb: 256
      ub: 1024
      step: 64
    alpha: [1.5, 0, -1.5]
    beta: [1.5, 0, -1.5]
    # Optional Params
    lda: [256, 512, 768]
    ldb:
      lb: 256
      ub: 1024
      step: 64
    ldc: 256
    mtagA: "none"    # Default none
    mtagB: "reorder" # Matrix B reordering can improve performance
    tolerances:
      absolute: 50
      relative: 50
    post_operations:
      cartesian: false  # Simpler for medium matrices
      operations:
        # Commonly used PostOps for performance testing
        - type: "Elementwise-RELU"
        - type: "Elementwise-PRELU"
          params:
            alpha_type: ["f32"]
        - type: "Bias"
          params:
            bias_type: ["f32"]
            bias_dim: ["n"]
        - type: "Scale"
          params:
            scale_factor_type: ["f32"]
