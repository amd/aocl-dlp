# GEMM test configuration file with PostOps - Comprehensive parameter testing
yaml_test:
  # Test case 1: Elementwise-CLIP with default values (backward compatibility)
  - name: "elementwise_clip_default_values"
    a_type: ["f32"]
    b_type: ["f32"]
    c_type: ["f32"]
    acc_type: ["f32"]
    storage_format: ["row-major"]
    transA: [false]
    transB: [false]
    m: 4
    n: 4
    k: 4
    alpha: 1.0
    beta: 0.0
    lda: 4
    ldb: 4
    ldc: 4
    mtagA: "none"
    mtagB: "none"
    tolerances:
      relative: 125.0
      absolute: 50.0
    post_operations:
      cartesian: true
      operations:
        - type: "Elementwise-CLIP"
          params: {}

  # Test case 2: Elementwise operations with custom parameters
  - name: "elementwise_custom_parameters"
    a_type: ["f32"]
    b_type: ["f32"]
    c_type: ["f32"]
    acc_type: ["f32"]
    storage_format: ["row-major"]
    transA: [false]
    transB: [false]
    m: 4
    n: 4
    k: 4
    alpha: 1.0
    beta: 0.0
    lda: 4
    ldb: 4
    ldc: 4
    mtagA: "none"
    mtagB: "none"
    tolerances:
      relative: 130.0
      absolute: 52.0
    post_operations:
      cartesian: false
      operations:
        - type: "Elementwise-CLIP"
          params:
            alpha: [2.0]
            alpha_type: ["f32"]
            beta: [5.0]
            beta_type: ["f32"]
        - type: "Elementwise-PRELU"
          params:
            alpha: ["0.2"]
            alpha_type: ["f32"]
        - type: "Scale"
          params:
            scale_factor: ["3.0"]
            scale_factor_type: ["f32"]
            is_power_of_2: ["false"]

  # Test case 3: Different data types (bf16) validation
  - name: "elementwise_different_types"
    a_type: ["f32"]
    b_type: ["f32"]
    c_type: ["f32"]
    acc_type: ["f32"]
    storage_format: ["row-major"]
    transA: [false]
    transB: [false]
    m: 4
    n: 4
    k: 4
    alpha: 1.0
    beta: 0.0
    lda: 4
    ldb: 4
    ldc: 4
    mtagA: "none"
    mtagB: "none"
    tolerances:
      relative: 125.0
      absolute: 50.0
    post_operations:
      cartesian: true
      operations:
        - type: "Elementwise-CLIP"
          params:
            alpha: [1.5]
            alpha_type: ["bf16"]
            beta: [3.5]
            beta_type: ["bf16"]

  # Test case 4: Elementwise-MISH standalone — non-square dims, both layouts
  - name: "elementwise_mish"
    a_type: ["f32"]
    b_type: ["f32"]
    c_type: ["f32"]
    acc_type: ["f32"]
    storage_format: ["row-major", "column-major"]
    transA: [false, true]
    transB: [false, true]
    m: 8
    n: 16
    k: 12
    alpha: 1.0
    beta: 0.0
    mtagA: "none"
    mtagB: "none"
    tolerances:
      relative: 132.5
      absolute: 53.0
    post_operations:
      cartesian: false
      operations:
        - type: "Elementwise-MISH"

  # Test case 5: Elementwise-MISH chained with Bias — non-square dims, both layouts
  - name: "elementwise_mish_chained"
    a_type: ["f32"]
    b_type: ["f32"]
    c_type: ["f32"]
    acc_type: ["f32"]
    storage_format: ["row-major", "column-major"]
    transA: [false, true]
    transB: [false, true]
    m: 12
    n: 8
    k: 16
    alpha: 1.0
    beta: 0.0
    mtagA: "none"
    mtagB: "none"
    tolerances:
      relative: 132.5
      absolute: 53.0
    post_operations:
      cartesian: false
      operations:
        - type: "Bias"
          params:
            bias_type: ["f32"]
            bias_dim: ["n"]
        - type: "Elementwise-MISH"
