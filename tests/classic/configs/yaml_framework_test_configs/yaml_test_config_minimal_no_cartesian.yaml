# Minimal YAML test configuration WITHOUT cartesian PostOps
# Should generate exactly 3 combinations: 1 base × 3 PostOps combinations (empty + 2 individual)
gemm_tests:
  - name: "minimal_postops_test_no_cartesian"
    a_type: ["f32"]
    b_type: ["f32"]
    c_type: ["f32"]
    acc_type: ["f32"]
    storage_format: ["row-major"]
    transA: [false]
    transB: [false]
    # Single values for dimensions
    m: 10
    n: 10
    k: 10
    alpha: 1.0
    beta: 0.0
    # Single values for leading dimensions
    lda: 10
    ldb: 10
    ldc: 10
    mtagA: ["none"]
    mtagB: ["none"]
    tolerances:
      relative: 127.5
      absolute: 51.0
    post_operations:
      cartesian: false  # This should give us only individual operations + empty
      operations:
        - type: "Elementwise-RELU"
        - type: "Bias"
          params:
            bias_type: ["f32"]
            bias_dim: ["n"]
