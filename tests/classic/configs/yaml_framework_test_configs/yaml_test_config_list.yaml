# GEMM test configuration file
yaml_test:
  - name: "small_matrix"
    a_type: ["f32"]
    b_type: ["f32"]
    c_type: ["f32"]
    acc_type: ["f32"]
    storage_format: ["row-major"]
    transA: [false, true]
    transB: [true]
    m: 10
    n: 10
    k: 10
    alpha: [2.5, 0, -2.5]
    beta: [2.5, 0, -2.5]
    lda: [10, 20, 30]
    ldb: 10
    ldc: 10
    mtagA: "none"
    mtagB: "reorder"
    tolerances:
      absolute: 50
      relative: 50
    post_operations:
      cartesian: true
      operations:
        # Limited to 3 operations for reasonable test performance
        - type: "Elementwise-RELU"
        - type: "Bias"
          params:
            bias_type: ["f32"]
            bias_dim: ["n"]
        - type: "Scale"
          params:
            scale_factor_len: ["1"]
            scale_factor_type: ["f32"]
