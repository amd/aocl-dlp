gemm_tests:
  # A matrix quantisation tests using the A_Quant operation
  # These test the AQuantParam support in the IUalPlan framework

  - name: "bf16s8_b_quant_basic"
    a_type: ["bf16"]
    b_type: ["s8"]
    c_type: ["f32", "bf16"]
    acc_type: ["s32"]
    storage_format: ["row-major"]
    transA: [false]
    transB: [false]
    m: [4, 16, 32]
    n: [4, 16, 32]
    k: [4, 16, 32]
    alpha: [1.0]
    beta: [0.0, 1.0]
    tolerances:
      float: 1.0e-4
      bfloat16: 0
    post_operations:
      combination_type: "simple_product"
      operations:
        - type: "A_Quant"
          params:
            a_quant_sf_len: ["1"]
            a_quant_sf_type: ["f32"]
            a_quant_zp_len: ["1"]
            a_quant_zp_type: ["f32"]

  - name: "f32s8_b_quant_basic"
    a_type: ["f32"]
    b_type: ["s8"]
    c_type: ["f32"]
    acc_type: ["s32"]
    storage_format: ["row-major"]
    transA: [false]
    transB: [false]
    m: [4, 16, 32]
    n: [4, 16, 32]
    k: [4, 16, 32]
    alpha: [1.0]
    beta: [0.0]
    tolerances:
      float: 1.0e-4
    post_operations:
      combination_type: "simple_product"
      operations:
        - type: "A_Quant"
          params:
            a_quant_sf_len: ["1"]
            a_quant_sf_type: ["f32"]
            a_quant_zp_len: ["1"]
            a_quant_zp_type: ["f32"]
