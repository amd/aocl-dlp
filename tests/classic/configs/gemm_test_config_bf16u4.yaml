# GEMM test configuration for BF16×U4 (WOQ) with reference implementation
# BF16 (bfloat16) × U4 (4-bit unsigned) matrix multiplication with weight-only quantization
# Use: ./test_gemm -f <path>/gemm_test_config_bf16u4.yaml
#
# U4 uses asymmetric dequant: dequant = (value - zp) * scale; zero_point is required.
# Ref implementation: aocl_gemm_bf16u4f32of32_ref with WOQ pre_operations
# DLP: aocl_gemm_bf16u4f32of32 / aocl_gemm_bf16u4f32obf16 with metadata pre_ops (B scale/zp)
#
# Architecture Parameters (ZEN4): MR=6, NR=64, MC=144, NC=1024, KC=2048

gemm_tests:
  # ==========================================================================
  # Test 1: Systematic M Sweep (GEMM MR variants + MC boundaries)
  # ==========================================================================
  - name: "bf16u4f32of32_optimized_m_sweep"
    a_type: ["bf16"]
    b_type: ["u4"]
    c_type: ["bf16", "f32"]
    acc_type: ["f32"]
    storage_format: ["row-major", "col-major"]
    transA: [false, true]
    transB: [false, true]
    m:
      lb: 1
      ub: 30
      step: 3
    n: [1, 2, 15, 16, 17, 31, 32, 33, 47, 48, 49, 63, 64, 65, 129, 1024, 1025]
    k: [1, 2, 3, 4, 8, 2048, 2049]
    alpha: [3.0]
    beta: [3.0]
    lda: [2049]
    ldb: [2049]
    ldc: [2049]
    mtagA: ["none"]
    mtagB: ["reorder"]
    pre_operations:
      cartesian: false
      operations:
        - type: "WOQ"
          params:
            scale_factor_len: ["1", "n"]
            scale_factor_type: ["f32"]
            zero_point_len: ["1", "n"]
            zero_point_type: ["s8", "bf16"]
    tolerances:
      absolute: 0
      relative: 0

  # ==========================================================================
  # Test 2: Systematic M Sweep (MC boundaries 144–174)
  # ==========================================================================
  - name: "bf16u4f32of32_optimized_m_sweep_1"
    a_type: ["bf16"]
