# GEMM FP32 Nightly Test Configuration
# Target: JIT code path coverage with strategic dimension selection
# Runtime: ~30-45 minutes
# Focus: FP32 data type with comprehensive JIT kernel coverage
#
# Architecture Parameters (ZEN4):
#   MC=192, NC=8064, KC=512, MR=6, NR=64 (AVX512)
# Architecture Parameters (ZEN):
#   MC=144, NC=8160, KC=512, MR=6, NR=16 (AVX2)
#
# This configuration focuses on hitting all JIT kernel variants
# while keeping test count manageable for nightly runs

gemm_tests:
  # ==========================================================================
  # Test Set 1: MR Fringe Variants - Test all 7 JIT kernel MR variants
  # Covers: M%6 ∈ {0,1,2,3,4,5} + mLoop testing
  # ==========================================================================
  - name: "fp32_mr_variants"
    a_type: ["f32"]
    b_type: ["f32"]
    c_type: ["f32"]
    acc_type: ["f32"]
    storage_format: ["row-major"]
    transA: [false]
    transB: [false]
    # M values to hit all MR variants: 1,2,3,4,5,6,7,12,13,192,193
    m: [1, 2, 3, 4, 5, 6, 7, 12, 13, 192, 193]
    n: [64]  # Standard NR for ZEN4
    k: [64]
    alpha: [1.0]
    beta: [0.0]
    mtagA: ["none"]
    mtagB: ["none"]
    tolerances:
      absolute: 0
      relative: 0

  # ==========================================================================
  # Test Set 2: NR Register Allocation Variants
  # ==========================================================================
  - name: "fp32_nr_variants_avx512"
    a_type: ["f32"]
    b_type: ["f32"]
    c_type: ["f32"]
    acc_type: ["f32"]
    storage_format: ["row-major"]
    transA: [false]
    transB: [false]
    m: [6, 12]
    n: [1, 8, 15, 16, 24, 31, 32, 40, 47, 48, 56, 63, 64, 80, 128]
    k: [64]
    alpha: [1.0]
    beta: [0.0]
    mtagA: ["none"]
    mtagB: ["none"]
    tolerances:
      absolute: 0
      relative: 0

  # ==========================================================================
  # Test Set 3: K-loop Unroll and Remainder Handling
  # ==========================================================================
  - name: "fp32_k_unroll"
    a_type: ["f32"]
    b_type: ["f32"]
    c_type: ["f32"]
    acc_type: ["f32"]
    storage_format: ["row-major"]
    transA: [false]
    transB: [false]
    m: [6, 12]
    n: [64]
    k: [1, 2, 3, 4, 5, 7, 8, 9, 16, 64, 256, 511, 512, 513, 1023, 1024, 1025]
    alpha: [1.0]
    beta: [0.0]
    mtagA: ["none"]
    mtagB: ["none"]
    tolerances:
      absolute: 0
      relative: 0

  # ==========================================================================
  # Test Set 4: Alpha/Beta Scaling
  # ==========================================================================
  - name: "fp32_alpha_beta_scaling"
    a_type: ["f32"]
    b_type: ["f32"]
    c_type: ["f32"]
    acc_type: ["f32"]
    storage_format: ["row-major"]
    transA: [false]
    transB: [false]
    m: [6, 12]
    n: [64, 65]
    k: [64]
    alpha: [0.0, 1.0, 2.0, -1.0]
    beta: [0.0, 1.0, 2.0, -1.0]
    mtagA: ["none"]
    mtagB: ["none"]
    tolerances:
      absolute: 0
      relative: 0

  # ==========================================================================
  # Test Set 6: Cache Blocking Boundaries
  # ==========================================================================
  - name: "fp32_cache_boundaries"
    a_type: ["f32"]
    b_type: ["f32"]
    c_type: ["f32"]
    acc_type: ["f32"]
    storage_format: ["row-major"]
    transA: [false]
    transB: [false]
    m: [1, 6, 191, 192, 193, 383, 384, 385]
    n: [1, 64, 256, 4032, 8064, 8128]
    k: [1, 256, 511, 512, 513, 1024]
    alpha: [1.0, 2.0]
    beta: [0.0]
    mtagA: ["none"]
    mtagB: ["none"]
    tolerances:
      absolute: 0
      relative: 0

  # ==========================================================================
  # Test Set 7: Transpose Combinations
  # ==========================================================================
  - name: "fp32_transpose"
    a_type: ["f32"]
    b_type: ["f32"]
    c_type: ["f32"]
    acc_type: ["f32"]
    storage_format: ["row-major"]
    # All 4 combinations: NN, NT, TN, TT
    transA: [false, true]
    transB: [false, true]
    m: [6, 12, 192]
    n: [64, 128]
    k: [64, 512]
    alpha: [1.0]
    beta: [0.0]
    mtagA: ["none"]
    mtagB: ["none"]
    tolerances:
      absolute: 0
      relative: 0

  # ==========================================================================
  # Test Set 8: Matrix Reordering/Packing Combinations
  # ==========================================================================
  - name: "fp32_mtag_combinations"
    a_type: ["f32"]
    b_type: ["f32"]
    c_type: ["f32"]
    acc_type: ["f32"]
    storage_format: ["row-major"]
    transA: [false]
    transB: [false]
    m: [12, 192]
    n: [64, 128]
    k: [64, 512]
    alpha: [1.0]
    beta: [0.0]
    mtagA: ["none"]
    mtagB: ["reorder"]
    tolerances:
      absolute: 0
      relative: 0

  # ==========================================================================
  # Test Set 9: Edge Cases - Small dimensions and primes
  # ==========================================================================
  - name: "fp32_edge_cases"
    a_type: ["f32"]
    b_type: ["f32"]
    c_type: ["f32"]
    acc_type: ["f32"]
    storage_format: ["row-major"]
    transA: [false]
    transB: [false]
    m: [1, 7, 11, 13, 17, 19, 23, 29, 31]
    n: [1, 7, 11, 13, 17, 19, 23, 29, 31]
    k: [1, 7, 11, 13, 17, 19, 23, 29, 31]
    alpha: [1.0, 3.0]
    beta: [0.0]
    mtagA: ["none"]
    mtagB: ["none"]
    tolerances:
      absolute: 0
      relative: 0

  # ==========================================================================
  # Column-Major Pathological Cases
  # ==========================================================================

  # Odd alignment with column-major
  - name: "colmaj_odd_alignment"
    a_type: ["f32"]
    b_type: ["f32"]
    c_type: ["f32"]
    acc_type: ["f32"]
    storage_format: ["column-major"]
    transA: [false]
    transB: [false, true]
    m: [33, 65, 129]  # Odd numbers near power-of-2
    n: [65]  # Single representative value
    k: [65]  # Single representative value
    alpha: [1.0]
    beta: [1.0]
    # Single odd LD to test alignment breaking
    lda: [67]
    ldb: [67]
    ldc: [67]
    mtagA: ["none"]
    mtagB: ["none"]
    tolerances:
      absolute: 0
      relative: 0
