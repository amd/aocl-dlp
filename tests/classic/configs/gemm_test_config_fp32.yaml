# GEMM FP32 Nightly Test Configuration
# Target: JIT code path coverage with strategic dimension selection
# Runtime: ~30-45 minutes
# Focus: FP32 data type with comprehensive JIT kernel coverage
#
# Architecture Parameters (ZEN4):
#   MC=192, NC=8064, KC=512, MR=6, NR=64 (AVX512)
# Architecture Parameters (ZEN):
#   MC=144, NC=8160, KC=512, MR=6, NR=16 (AVX2)
#
# This configuration focuses on hitting all JIT kernel variants
# while keeping test count manageable for nightly runs

gemm_tests:
  # ==========================================================================
  # Test Set 1: MR Fringe Variants - Test all 7 JIT kernel MR variants
  # Covers: M%6 ∈ {0,1,2,3,4,5} + mLoop testing
  # ==========================================================================
  - name: "fp32_mr_variants"
    a_type: ["f32"]
    b_type: ["f32"]
    c_type: ["f32"]
    acc_type: ["f32"]
    storage_format: ["row-major"]
    transA: [false]
    transB: [false]
    # M values to hit all MR variants: 1,2,3,4,5,6,7,12,13,192,193
    m: [1, 2, 3, 4, 5, 6, 7, 12, 13, 192, 193]
    n: [64]  # Standard NR for ZEN4
    k: [64]
    alpha: [1.0]
    beta: [0.0]
    mtagA: ["none"]
    mtagB: ["none"]
    tolerances:
      float: 1.0e-5
      bfloat16: 1.0e-2

  # ==========================================================================
  # Test Set 2: NR Register Allocation Variants
  # Covers: All 5 AVX512 NR variants (nr=0,1,2,3,4) with masking
  # ==========================================================================
  - name: "fp32_nr_variants_avx512"
    a_type: ["f32"]
    b_type: ["f32"]
    c_type: ["f32"]
    acc_type: ["f32"]
    storage_format: ["row-major"]
    transA: [false]
    transB: [false]
    m: [6, 12]  # M%6=0 to isolate NR testing
    # N values to hit all NR register patterns:
    #   1,8,15: masked (N<16, nr=0)
    #   16,24,31: 1 full ZMM (16≤N<32, nr=1)
    #   32,40,47: 2 full ZMMs (32≤N<48, nr=2)
    #   48,56,63: 3 full ZMMs (48≤N<64, nr=3)
    #   64,80,128: 4 full ZMMs (N≥64, nr=4)
    n: [1, 8, 15, 16, 24, 31, 32, 40, 47, 48, 56, 63, 64, 80, 128]
    k: [64]
    alpha: [1.0]
    beta: [0.0]
    mtagA: ["none"]
    mtagB: ["none"]
    tolerances:
      float: 1.0e-5
      bfloat16: 1.0e-2

  # ==========================================================================
  # Test Set 3: K-loop Unroll and Remainder Handling
  # Covers: Main K-loop, kLeft path, KC boundaries
  # ==========================================================================
  - name: "fp32_k_unroll"
    a_type: ["f32"]
    b_type: ["f32"]
    c_type: ["f32"]
    acc_type: ["f32"]
    storage_format: ["row-major"]
    transA: [false]
    transB: [false]
    m: [6, 12]
    n: [64]
    # K values to test unroll paths (assuming K_UNROLL=4):
    #   Small: 1,2,3,4,5,7,8,9 (tests kLeft with different remainders)
    #   KC boundaries: 511,512,513 (KC-1, KC, KC+1)
    #   2*KC boundaries: 1023,1024,1025
    k: [1, 2, 3, 4, 5, 7, 8, 9, 16, 64, 256, 511, 512, 513, 1023, 1024, 1025]
    alpha: [1.0]
    beta: [0.0]
    mtagA: ["none"]
    mtagB: ["none"]
    tolerances:
      float: 1.0e-5
      bfloat16: 1.0e-2

  # ==========================================================================
  # Test Set 4: Alpha/Beta Scaling Code Paths
  # Covers: scaleAlpha() and scaleBeta() conditionals and FMA paths
  # ==========================================================================
  - name: "fp32_alpha_beta_scaling"
    a_type: ["f32"]
    b_type: ["f32"]
    c_type: ["f32"]
    acc_type: ["f32"]
    storage_format: ["row-major"]
    transA: [false]
    transB: [false]
    m: [6, 12]
    # N=64 (aligned), N=65 (tests fringe masking in beta load)
    n: [64, 65]
    k: [64]
    # Alpha values: 0.0 (zero result), 1.0 (skip scaling), 2.0, 0.5, -1.0
    alpha: [0.0, 1.0, 2.0, 0.5, -1.0]
    # Beta values: 0.0 (skip beta), 1.0 (standard accum), 2.0, 0.5, -1.0
    beta: [0.0, 1.0, 2.0, 0.5, -1.0]
    mtagA: ["none"]
    mtagB: ["none"]
    tolerances:
      float: 1.0e-5
      bfloat16: 1.0e-2

  # ==========================================================================
  # Test Set 5: Cache Blocking Boundaries (MC, NC, KC)
  # Covers: Transitions between blocking levels
  # ==========================================================================
  - name: "fp32_cache_boundaries"
    a_type: ["f32"]
    b_type: ["f32"]
    c_type: ["f32"]
    acc_type: ["f32"]
    storage_format: ["row-major"]
    transA: [false]
    transB: [false]
    # MC boundaries (192 for ZEN4): 1,6,191,192,193,383,384,385
    m: [1, 6, 191, 192, 193, 383, 384, 385]
    # NC boundaries (8064): subset for nightly
    n: [1, 64, 256, 4032, 8064, 8128]
    # KC boundaries (512): 1,256,511,512,513,1024
    k: [1, 256, 511, 512, 513, 1024]
    alpha: [1.0]
    beta: [0.0]
    mtagA: ["none"]
    mtagB: ["none"]
    tolerances:
      float: 1.0e-5
      bfloat16: 1.0e-2

  # ==========================================================================
  # Test Set 6: Transpose Combinations
  # Covers: All 4 transpose combinations with selected dimensions
  # ==========================================================================
  - name: "fp32_transpose"
    a_type: ["f32"]
    b_type: ["f32"]
    c_type: ["f32"]
    acc_type: ["f32"]
    storage_format: ["row-major"]
    # All 4 combinations: NN, NT, TN, TT
    transA: [false, true]
    transB: [false, true]
    m: [6, 12, 192]
    n: [64, 128]
    k: [64, 512]
    alpha: [1.0]
    beta: [0.0]
    mtagA: ["none"]
    mtagB: ["none"]
    tolerances:
      float: 1.0e-5
      bfloat16: 1.0e-2

  # ==========================================================================
  # Test Set 7: Matrix Reordering/Packing Combinations
  # Covers: mtagB variants (none, pack, reorder)
  # ==========================================================================
  - name: "fp32_mtag_combinations"
    a_type: ["f32"]
    b_type: ["f32"]
    c_type: ["f32"]
    acc_type: ["f32"]
    storage_format: ["row-major"]
    transA: [false]
    transB: [false, true]  # Test both normal and transposed B with reordering
    m: [6, 12, 192]
    n: [64, 128]
    k: [64, 512]
    alpha: [1.0]
    beta: [0.0]
    mtagA: ["none"]
    mtagB: ["none", "pack", "reorder"]
    tolerances:
      float: 1.0e-5
      bfloat16: 1.0e-2

  # ==========================================================================
  # Test Set 8: Edge Cases - Small dimensions and primes
  # Covers: Unusual dimensions that might trigger edge cases
  # ==========================================================================
  - name: "fp32_edge_cases"
    a_type: ["f32"]
    b_type: ["f32"]
    c_type: ["f32"]
    acc_type: ["f32"]
    storage_format: ["row-major"]
    transA: [false]
    transB: [false]
    # Small dimensions and primes: 1,7,11,13,17,19,23,29,31
    m: [1, 7, 11, 13, 17, 19, 23, 29, 31]
    n: [1, 7, 11, 13, 17, 19, 23, 29, 31]
    k: [1, 7, 11, 13, 17, 19, 23, 29, 31]
    alpha: [1.0]
    beta: [0.0]
    mtagA: ["none"]
    mtagB: ["none"]
    tolerances:
      float: 1.0e-5
      bfloat16: 1.0e-2
