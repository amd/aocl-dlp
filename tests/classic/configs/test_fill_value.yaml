# Test configuration demonstrating fill_value feature
gemm_tests:
  # Test with uniform distribution between -5 and 5
  - name: "fill_value_uniform_test"
    a_type: ["bf16"]
    b_type: ["bf16"]
    c_type: ["bf16"]
    acc_type: ["f32"]
    storage_format: ["row-major"]
    transA: [false]
    transB: [false]
    m: 288
    n: 129
    k: 4099
    lda: 4099
    ldb: 129
    ldc: 129
    alpha: [1.0]
    beta: [1.0]
    mtagA: ["none"]
    mtagB: ["none"]
    tolerances:
      absolute: 0
      relative: 0
    fill_value:
      ub: 5
      lb: -5
      dist: "uniform"
    product_type: cartesian

  # Test with normal distribution
  - name: "fill_value_normal_test"
    a_type: ["f32"]
    b_type: ["f32"]
    c_type: ["f32"]
    acc_type: ["f32"]
    storage_format: ["row-major"]
    transA: [false]
    transB: [false]
    m: 64
    n: 64
    k: 64
    alpha: [1.0]
    beta: [0.0]
    mtagA: ["none"]
    mtagB: ["none"]
    tolerances:
      absolute: 0
      relative: 0
    fill_value:
      lb: -2.0
      ub: 2.0
      dist: "normal"
    product_type: cartesian

  # Test without fill_value (backward compatibility)
  - name: "no_fill_value_test"
    a_type: ["s8"]
    b_type: ["s8"]
    c_type: ["s32"]
    acc_type: ["s32"]
    storage_format: ["row-major"]
    transA: [false]
    transB: [false]
    m: 32
    n: 32
    k: 32
    alpha: [1.0]
    beta: [0.0]
    mtagA: ["none"]
    mtagB: ["none"]
    product_type: cartesian
