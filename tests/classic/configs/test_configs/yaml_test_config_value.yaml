# GEMM test configuration file
yaml_test:
  - name: "small_matrix"
    a_type: "f32"
    b_type: "f32"
    c_type: "f32"
    acc_type: "f32" # Same type will be used for alpha and beta
    storage_format: "row-major"
    transA: true
    transB: false
    m: 10
    n: 10
    k: 10
    alpha: 1.0
    beta: 0.0
    lda: 10
    ldb: 10
    ldc: 10
    mtagA: "none"
    mtagB: "none"
    tolerances:
      float: 1.0e-5
      bfloat16: 1.0e-2
      int8: 0
    post_operations:
      cartesian: false  # Simple for value-based config
      operations:
        # Essential PostOps
        - type: "Elementwise-RELU"
        - type: "Elementwise-PRELU"
          params:
            alpha_type: ["f32"]
        - type: "Bias"
          params:
            bias_type: ["f32"]
            bias_dim: ["1"]

  - name: "medium_matrix"
    a_type: "f32"
    b_type: "f32"
    c_type: "f32"
    acc_type: "f32"
    storage_format: "row-major"
    transA: false
    transB: true
    m: 256
    n: 256
    k: 256
    alpha: 1.0
    beta: 0.0
    lda: 256
    ldb: 256
    ldc: 256
    mtagA: "none"
    mtagB: "none"
    tolerances:
      float: 1.0e-4
      bfloat16: 1.0e-2
      int8: 0
    post_operations:
      cartesian: false
      operations:
        # Performance-oriented PostOps for larger matrices
        - type: "Elementwise-RELU"
        - type: "Scale"
          params:
            scale_factor_type: ["f32"]
            is_power_of_2: ["true"]
