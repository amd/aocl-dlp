    transA: [false, true]
    transB: [false, true]
    m: [9, 15, 21, 25, 27, 35, 49]  # Composite numbers coprime to common vector widths
    n: [9, 15, 21, 25, 27, 35, 49]  # Composite numbers coprime to common vector widths
    k: [9, 15, 21, 25, 27, 35, 49]  # Composite numbers coprime to common vector widths
