# GEMM test configuration file
gemm_tests:
  # Basic test cases
  # 0
  - name: "small_matrix_f32"
    a_type: ["f32"]
    b_type: ["f32"]
    c_type: ["f32"]
    acc_type: ["f32"]
    storage_format: ["row-major"]
    transA: [false, true]
    transB: [false, true]
    # Non optional
    m:
      lb: 10
      ub: 20
      step: 5
    n:
      lb: 10
      ub: 10
      step: -1
    k:
      lb: 10
      ub: 10
      step: -1
    alpha: [0, 2, -2]
    beta: [0, 2, -2]
    # Optional Params
    lda: [10, 20, 30]
    ldb:
      lb: 10
      ub: 10
      step: -1
    ldc: 10
    mtagA: ["none","pack"]
    mtagB: ["reorder","pack","none"]   # Matrix B reordering can improve performance
    tolerances:
      relative: 100.0
      absolute: 50.0
  # BF16 Tests
  #   Basic test cases
  # 1
  - name: "small_matrix_bf16"
    a_type: ["bf16"]
    b_type: ["bf16"]
    c_type: ["f32"]
    acc_type: ["f32"]
    storage_format: ["row-major"]
    transA: [false, true]
    transB: [false, true]
    # Non optional
    m:
      lb: 10
      ub: 20
      step: 5
    n:
      lb: 10
      ub: 10
      step: -1
    k:
      lb: 10
      ub: 10
      step: -1
    alpha: [0, 2, -2]
    beta: [0, 2, -2]
    # Optional Params
    lda: [10, 20, 30]
    ldb:
      lb: 10
      ub: 10
      step: -1
    ldc: 10
    mtagA: ["none","pack"]
    mtagB: ["reorder","pack","none"]   # Matrix B reordering can improve performance
    tolerances:
      relative: 100.0
      absolute: 50.0
    # product_type: "simple"

  # 2
  - name: "medium_matrix_bf16"
    a_type: ["bf16"]
    b_type: ["bf16"]
    c_type: ["f32"]
    acc_type: ["f32"]
    storage_format: ["row-major"]
    transA: [false, true]
    transB: [true, false]
    # Non optional
    m:
      lb: 256
      ub: 512
      step: 64
    n:
      lb: 256
      ub: 512
      step: 64
    k:
      lb: 256
      ub: 512
      step: 64
    alpha: [1, 0, -1]
    beta: [1, 0, -1]
    # Optional Params
    lda: [256, 768]
    ldb:
      lb: 256
      ub: 512
      step: 64
    ldc: 256
    mtagA: "none"
    mtagB: "reorder"
    tolerances:
      relative: 100.0
      absolute: 50.0
  # Int test cases
  # 3
  - name: "small_matrix_u8s8"
    a_type: ["u8"]
    b_type: ["s8"]
    c_type: ["s32"]
    acc_type: ["s32"]
    storage_format: ["row-major"]
    transA: [false, true]
    transB: [false, true]
    # Non optional
    m:
      lb: 1
      ub: 10
      step: 1
    n:
      lb: 1
      ub: 20
      step: 4
    k:
      lb: 1
      ub: 10
      step: 2
    alpha: [1]
    beta: [1]
    # Optional Params
    lda: [10, 20]
    ldb:
      lb: 10
      ub: 20
      step: 2
    ldc: 20
    mtagA: ["none"]
    mtagB: ["none", "reorder"]   # Matrix B reordering can improve performance

  - name: "small_matrix_s8s8"
    a_type: ["s8"]
    b_type: ["s8"]
    c_type: ["s32"]
    acc_type: ["s32"]
    storage_format: ["row-major"]
    transA: [false, true]
    transB: [false, true]
    # Non optional
    m:
      lb: 1
      ub: 10
      step: 1
    n:
      lb: 1
      ub: 20
      step: 4
    k:
      lb: 1
      ub: 10
      step: 2
    alpha: [1]
    beta: [1]
    # Optional Params
    lda: [10, 20]
    ldb:
      lb: 10
      ub: 20
      step: 2
    ldc: 20
    mtagA: ["none"]
    mtagB: ["none", "reorder"]   # Matrix B reordering can improve performance

  - name: "small_matrix_s8s8_fp16"
    a_type: ["s8"]
    b_type: ["s8"]
    c_type: ["fp16"]
    acc_type: ["s32"]
    storage_format: ["row-major"]
    transA: [false, true]
    transB: [false, true]
    m:
      lb: 1
      ub: 10
      step: 1
    n:
      lb: 1
      ub: 20
      step: 4
    k:
      lb: 1
      ub: 10
      step: 2
    alpha: [1]
    beta: [1]
    lda: [10, 20]
    ldb:
      lb: 10
      ub: 20
      step: 2
    ldc: 20
    mtagA: ["none"]
    mtagB: ["none", "reorder"]

# ─────────────────────────────────────────────────────────────────────────────
# Per-token (PerM) DOWNSCALE post-op tests
# One float32 scale factor per output row (M values total).
# ─────────────────────────────────────────────────────────────────────────────

  # Row-major output, per-token scale: canonical transformer inference pattern.
  - name: "s8s8_downscale_per_token_rowmajor"
    a_type: ["s8"]
    b_type: ["s8"]
    c_type: ["s32"]
    acc_type: ["s32"]
    storage_format: ["row-major"]
    transA: [false]
    transB: [false]
    m:
      lb: 1
      ub: 14
      step: 3
    n:
      lb: 16
      ub: 64
      step: 16
    k: [32]
    alpha: [1]
    beta: [0]
    mtagA: ["none"]
    mtagB: ["none", "reorder"]
    tolerances:
      relative: 5.0
      absolute: 2.0
    post_operations:
      cartesian: false
      operations:
        - type: "Scale"
          params:
            scale_factor_type: ["f32"]
            scale_factor_len: ["m"]

  # Column-major output, per-token scale: verifies the PerM↔PerCol flip.
  - name: "s8s8_downscale_per_token_colmajor"
    a_type: ["s8"]
    b_type: ["s8"]
    c_type: ["s32"]
    acc_type: ["s32"]
    storage_format: ["column-major"]
    transA: [false]
    transB: [false]
    m:
      lb: 1
      ub: 14
      step: 3
    n:
      lb: 16
      ub: 64
      step: 16
    k: [32]
    alpha: [1]
    beta: [0]
    mtagA: ["none"]
    mtagB: ["none", "reorder"]
    tolerances:
      relative: 5.0
      absolute: 2.0
    post_operations:
      cartesian: false
      operations:
        - type: "Scale"
          params:
            scale_factor_type: ["f32"]
            scale_factor_len: ["m"]

  # Row-major output, per-token scale + per-column zero point:
  # mixed SF/ZP dimension exercising both PerM and PerN paths together.
  - name: "s8s8_downscale_per_token_sf_percol_zp_rowmajor"
    a_type: ["s8"]
    b_type: ["s8"]
    c_type: ["s32"]
    acc_type: ["s32"]
    storage_format: ["row-major"]
    transA: [false]
    transB: [false]
    m: [6, 13]
    n: [16, 64]
    k: [32]
    alpha: [1]
    beta: [0]
    mtagA: ["none"]
    mtagB: ["none"]
    tolerances:
      relative: 5.0
      absolute: 2.0
    post_operations:
      cartesian: false
      operations:
        - type: "Scale"
          params:
            scale_factor_type: ["f32"]
            scale_factor_len: ["m"]
            zero_point_type: ["s8"]
            zero_point_len: ["n"]

# To test unpack B routine when bf16 fallbacks to f32 on avx2 machines
  - name: "bf16_reorderB_for_avx2"
    a_type: ["bf16"]
    b_type: ["bf16"]
    c_type: ["f32"]
    acc_type: ["f32"]
    storage_format: ["row-major"]
    transA: [false]
    transB: [false]
    m: 144
    n:
      lb: 1091
      ub: 1100
      step: 1
    k: 1024
    alpha: [1.0]
    beta: [1.0]
    mtagA: ["none"]
    mtagB: ["reorder"]
    tolerances:
      relative: 100.0
      absolute: 50.0
