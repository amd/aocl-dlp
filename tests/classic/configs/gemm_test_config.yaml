# GEMM test configuration file
gemm_tests:
  # Basic test cases
  # 0
  - name: "small_matrix_f32"
    a_type: ["f32"]
    b_type: ["f32"]
    c_type: ["f32"]
    acc_type: ["f32"]
    storage_format: ["row-major"]
    transA: [false, true]
    transB: [false, true]
    # Non optional
    m:
      lb: 10
      ub: 20
      step: 5
    n:
      lb: 10
      ub: 10
      step: -1
    k:
      lb: 10
      ub: 10
      step: -1
    alpha: [0, 2, -2]
    beta: [0, 2, -2]
    # Optional Params
    lda: [10, 20, 30]
    ldb:
      lb: 10
      ub: 10
      step: -1
    ldc: 10
    mtagA: ["none","pack"]
    mtagB: ["reorder","pack","none"]   # Matrix B reordering can improve performance
    tolerances:
      absolute: 0
      relative: 0

  # BF16 Tests
  #   Basic test cases
  # 1
  - name: "small_matrix_bf16"
    a_type: ["bf16"]
    b_type: ["bf16"]
    c_type: ["f32"]
    acc_type: ["f32"]
    storage_format: ["row-major"]
    transA: [false, true]
    transB: [false, true]
    # Non optional
    m:
      lb: 10
      ub: 20
      step: 5
    n:
      lb: 10
      ub: 10
      step: -1
    k:
      lb: 10
      ub: 10
      step: -1
    alpha: [0, 2, -2]
    beta: [0, 2, -2]
    # Optional Params
    lda: [10, 20, 30]
    ldb:
      lb: 10
      ub: 10
      step: -1
    ldc: 10
    mtagA: ["none","pack"]
    mtagB: ["reorder","pack","none"]   # Matrix B reordering can improve performance
    tolerances:
      absolute: 0
      relative: 0
    # product_type: "simple"

  # 2
  - name: "medium_matrix_bf16"
    a_type: ["bf16"]
    b_type: ["bf16"]
    c_type: ["f32"]
    acc_type: ["f32"]
    storage_format: ["row-major"]
    transA: [false, true]
    transB: [true, false]
    # Non optional
    m:
      lb: 256
      ub: 1024
      step: 64
    n:
      lb: 256
      ub: 1024
      step: 64
    k:
      lb: 256
      ub: 1024
      step: 64
    alpha: [1, 0, -1]
    beta: [1, 0, -1]
    # Optional Params
    lda: [256, 512, 768]
    ldb:
      lb: 256
      ub: 1024
      step: 64
    ldc: 256
    mtagA: "none"
    mtagB: "reorder"
    tolerances:
      absolute: 0
      relative: 0

  # Int test cases
  # 3
  - name: "small_matrix_int"
    a_type: ["u8"]
    b_type: ["s8"]
    c_type: ["s32"]
    acc_type: ["s32"]
    storage_format: ["row-major"]
    transA: [false, true]
    transB: [false, true]
    # Non optional
    m:
      lb: 1
      ub: 20
      step: 1
    n:
      lb: 1
      ub: 20
      step: 1
    k:
      lb: 1
      ub: 20
      step: 1
    alpha: [1]
    beta: [1]
    # Optional Params
    lda: [10, 20, 30]
    ldb:
      lb: 10
      ub: 20
      step: 1
    ldc: 20
    mtagA: ["none"]
    mtagB: ["none", "reorder"]   # Matrix B reordering can improve performance
