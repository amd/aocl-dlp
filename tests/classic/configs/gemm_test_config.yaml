  - name: "medium_matrix_int"
    a_type: ["s8"]
    b_type: ["s8"]
    c_type: ["s32"]
    acc_type: ["s32"]
    storage_format: ["row-major"]
    transA: [false, true]
    transB: [true, false]
    # Non optional
