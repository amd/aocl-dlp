# GEMM test configuration file
gemm_tests:
  # F32 Tests
  - name: "small_matrix_f32"
    a_type: ["f32"]
    b_type: ["f32"]
    c_type: ["f32"]
    acc_type: ["f32"]
    storage_format: ["row-major"]
    transA: [false, true]
    transB: [false, true]
    m:
      lb: 1
      ub: 20
      step: 1
    n:
      lb: 1
      ub: 20
      step: 1
    k:
      lb: 1
      ub: 20
      step: 1
    alpha: [1]
    beta: [1]
    # Optional Params
    lda: [10, 20, 30]
    ldb:
      lb: 10
      ub: 20
      step: 1
    ldc: 20
    mtagA: ["none"]
    mtagB: ["reorder"]   # Matrix B reordering can improve performance
    tolerances:
      float: 1.0e-5
      bfloat16: 1.0e-2
      int8: 0
    post_operations:
      cartesian: true
      operations:
        - type: "Elementwise-PRELU"
          params:
            alpha_type: ["f32"]
            alpha: 2.0
    # product_type: "simple"
  # Basic test cases
  - name: "small_matrix_postops"
    a_type: ["u8"]
    b_type: ["s8"]
    c_type: ["s32"]
    acc_type: ["s32"]
    storage_format: ["row-major"]
    transA: [false]
    transB: [false]
    # Non optional
    m:
      lb: 10
      ub: 20
      step: 1
    n:
      lb: 10
      ub: 10
      step: 1
    k:
      lb: 10
      ub: 20
      step: 1
    alpha: [1]
    beta: [1]
    # Optional Params
    lda: [10, 20, 30]
    ldb:
      lb: 10
      ub: 10
      step: -1
    ldc: 10
    mtagA: ["none","pack"]
    mtagB: ["reorder","pack","none"]
    tolerances:
      float: 1.0e-5
      bfloat16: 1.0e-2
      int8: 0
    post_operations:
      cartesian: true
      operations:
        - type: "Elementwise-PRELU"
          params:
            alpha_type: ["s32"]
        # - type: "Bias"
        #   params:
        #     bias_type: ["s32"]
        #     bias_dim: ["n","1"]
        # Sum disabled due to test suite issues
        # - type: "Sum"
        #   params:
        #     scale_factor_len: ["n","1"]
  # Int test cases
  - name: "small_matrix_int"
    a_type: ["u8"]
    b_type: ["s8"]
    c_type: ["s32"]
    acc_type: ["s32"]
    storage_format: ["row-major"]
