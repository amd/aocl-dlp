# F32×FP16→F32 Post-Operations Test Configuration
# A and C are F32, B is FP16, accumulation is F32
# Post-ops operate on F32 accumulators using F32 parameter types

gemm_tests:
  # ==========================================================================
  # RELU
  # ==========================================================================
  - name: "f32f16_postops_relu"
    a_type: ["f32"]
    b_type: ["fp16"]
    c_type: ["f32"]
    acc_type: ["f32"]
    storage_format: ["row-major"]
    transA: [false]
    transB: [false]
    m: [1, 6, 13, 32]
    n: [1, 16, 64, 128]
    k: [16, 32, 512]
    alpha: [2]
    beta: [2]
    mtagA: ["none"]
    mtagB: ["none", "pack"]
    tolerances:
      absolute: 0.01
      relative: 0.01
    fill_value:
      lb: -10
      ub: 10
      dist: "uniform"
    post_operations:
      cartesian: true
      operations:
        - type: "Elementwise-RELU"
          params:
            alpha_type: ["f32"]
            alpha: 1

  # ==========================================================================
  # PRELU
  # ==========================================================================
  - name: "f32f16_postops_prelu"
    a_type: ["f32"]
    b_type: ["fp16"]
    c_type: ["f32"]
    acc_type: ["f32"]
    storage_format: ["row-major"]
    transA: [false]
    transB: [false]
    m: [1, 6, 13]
    n: [1, 16, 64]
    k: [16, 32]
    alpha: [1.0]
    beta: [1.0]
    mtagA: ["none"]
    mtagB: ["none", "pack"]
    tolerances:
      absolute: 0.01
      relative: 0.01
    fill_value:
      lb: -10
      ub: 10
      dist: "uniform"
    post_operations:
      cartesian: true
      operations:
        - type: "Elementwise-PRELU"
          params:
            alpha_type: ["f32"]
            alpha: [2]

  # ==========================================================================
  # GELU-TANH
  # ==========================================================================
  - name: "f32f16_postops_gelu_tanh"
    a_type: ["f32"]
    b_type: ["fp16"]
    c_type: ["f32"]
    acc_type: ["f32"]
    storage_format: ["row-major"]
    transA: [false]
    transB: [false]
    m: [1, 6, 13]
    n: [1, 16, 64]
    k: [16, 32]
    alpha: [1.0]
    beta: [2]
    mtagA: ["none"]
    mtagB: ["none", "pack"]
    tolerances:
      float: 1.0e-4
    fill_value:
      lb: -5
      ub: 5
      dist: "uniform"
    post_operations:
      cartesian: true
      operations:
        - type: "Elementwise-GELU-TANH"
          params: {}

  # ==========================================================================
  # GELU-ERF
  # ==========================================================================
  - name: "f32f16_postops_gelu_erf"
    a_type: ["f32"]
    b_type: ["fp16"]
    c_type: ["f32"]
    acc_type: ["f32"]
    storage_format: ["row-major"]
    transA: [false]
    transB: [false]
    m: [1, 6, 13]
    n: [1, 16, 64]
    k: [16, 32]
    alpha: [2]
    beta: [2]
    mtagA: ["none"]
    mtagB: ["none", "pack"]
    tolerances:
      float: 1.0e-4
    fill_value:
      lb: -5
      ub: 5
      dist: "uniform"
    post_operations:
      cartesian: true
      operations:
        - type: "Elementwise-GELU-ERF"
