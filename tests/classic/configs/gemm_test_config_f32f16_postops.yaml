  - name: "f32f16_postops_clip"
    a_type: ["f32"]
    b_type: ["fp16"]
    c_type: ["f32"]
    acc_type: ["f32"]
    storage_format: ["row-major"]
    transA: [false]
    transB: [false]
    m: [1, 6, 13]
    n: [1, 16, 64]
    k: [16, 32]
    alpha: [1.0]
    beta: [1.0]
    mtagA: ["none"]
    mtagB: ["none", "pack"]
    tolerances:
      absolute: 0.01
      relative: 0.01
    fill_value:
      lb: -10
      ub: 10
      dist: "uniform"
    post_operations:
      cartesian: true
      operations:
        - type: "Elementwise-CLIP"
          params:
            min_type: ["f32"]
            min: [-5]
            max_type: ["f32"]
            max: [5]

  # ==========================================================================
