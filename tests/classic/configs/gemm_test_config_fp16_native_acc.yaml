# FP16 GEMM with NATIVE FP16 ACCUMULATION
# Uses vfmadd231ph instruction (FP16 accumulator, not F32!)
#
# Key Differences from F32 Accumulation:
#   - acc_type: ["fp16"] (not ["f32"])
#   - Alpha/beta are float16
#   - Native FP16 precision (reference now matches kernel exactly)
#   - Matches native Zen 6 hardware behavior
#
# Architecture: Zen 6 with AVX512-FP16
# Instruction: vfmadd231ph (native FP16 FMA)
#
# Kernel Tile Sizes:
#   - MR = 6 (rows per microkernel tile)
#   - NR = 128 (columns per microkernel tile, 4 ZMM registers × 32 FP16)
#   - KC = 256 (K blocking factor)
#
# Tolerance Notes:
#   - Reference implementation now exactly mimics kernel FP16 accumulation
#   - Near bit-exact matching expected for most cases
#   - Slightly wider tolerance for very large K due to accumulated rounding

gemm_tests:
  # ==========================================================================
  # Test Set 1: Main Kernel Tests (6x128)
  # Tests the full main kernel without fringe cases
  # ==========================================================================
  - name: "fp16_main_kernel_6x128"
    a_type: ["fp16"]
    b_type: ["fp16"]
    c_type: ["fp16"]
    acc_type: ["fp16"]
    storage_format: ["row-major"]
    transA: [false]
    transB: [false]
    m: [6, 12, 18, 24, 48, 96]  # Multiples of MR=6
    n: [128, 256, 384, 512]     # Multiples of NR=128
    k: [16, 32, 64, 128]
    alpha: [1.0]
    beta: [1.0]
    ldb: [512]
    mtagA: ["none"]
    mtagB: ["none", "pack", "reorder"]
    tolerances:
      absolute: 0.001
      relative: 0.001
    fill_value:
      lb: -10
      ub: 10
      dist: "uniform"

  # ==========================================================================
  # Test Set 2: N-Fringe Tests (6x96, 6x64, 6x32)
  # Tests when N is not a multiple of NR=128
  # ==========================================================================
  - name: "fp16_n_fringe_6x96"
