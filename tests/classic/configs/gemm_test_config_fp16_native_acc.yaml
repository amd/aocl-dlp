# ========================================================
# Test Set 3: N-Fringe Tests (3-panel pack)
# Eg. N=212 [128 + 64 + 20], N=254 [128 + 96 + 30],
# N = 177 [128 + 48 + 1], N = 163 [128 + 32 + 3]
# Reason : Packing behaviour is based on nfull_pieces (N/NR)
# The remaining pieces : nRemain = N % NR,
# then nPartial = nRemain / 96, 64, 32, if nPartial > 0, then packb_nr96, 64, 32 is called
# if nPartialrem > 0, then packb_nrlt32 is called
# if nPartial = 0, then packb_nrlt32 is called
# ========================================================
  - name: "fp16_n_fringe_3_panel_pack"
    a_type: ["fp16"]
    b_type: ["fp16"]
    c_type: ["fp16"]
    acc_type: ["fp16"]
    storage_format: ["row-major"]
    transA: [false]
    transB: [false]
    m: [1, 2, 3, 4, 5, 6, 13, 14, 15, 16, 17, 18]
    n: [212, 254, 177, 163]
    k: [16, 32, 64]
    alpha: [1.0]
    beta: [0.0, 1.0]
    mtagA: ["none"]
    mtagB: ["none", "pack", "reorder"]
    tolerances:
      absolute: 0.001
      relative: 0.001
