    storage_format: ["row-major"]
    transA: [false]
    transB: [false]
    m: [6, 12, 18]
    n: [96, 224, 352]  # 128*k - 32 (leaves 96 fringe)
    k: [16, 32, 64]
    alpha: [1.0]
    beta: [0.0, 1.0]
    mtagA: ["none"]
    mtagB: ["none", "pack", "reorder"]
    tolerances:
      absolute: 0.001
      relative: 0.001
    fill_value:
      lb: -5
      ub: 5
      dist: "uniform"

  - name: "fp16_n_fringe_6x64"
