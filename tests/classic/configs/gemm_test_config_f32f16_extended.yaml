# F32×FP16→F32 GEMM Comprehensive Test Configuration
# A and C are F32, B is FP16, accumulation is F32
#
# Architecture Parameters (ZEN4):
#   MC=192, NC=1024, KC=2048, MR=6, NR=64
#
# Key Differences from FP16×FP16:
#   - a_type: ["f32"] (not fp16)
#   - b_type: ["fp16"] (FP16 input)
#   - c_type: ["f32"] (F32 output)
#   - acc_type: ["f32"] (F32 accumulation)
#   - NR = 64
#
# ISA: AVX-512F + AVX-512BW + F16C (no AVX-512-FP16 required)
# Conversion: vcvtph2ps (FP16→F32 in JIT kernel)
# FMA: vfmadd231ps (F32 accumulation)

gemm_tests:
  # ==========================================================================
  # Test Set 1: MR Fringe Variants - All M%6 cases
  # Covers: M%6 ∈ {0,1,2,3,4,5} + mLoop testing
  # ==========================================================================
  - name: "f32f16_mr_variants"
    a_type: ["f32"]
    b_type: ["fp16"]
    c_type: ["f32"]
    acc_type: ["f32"]
    storage_format: ["row-major"]
    transA: [false]
    transB: [false]
    # M values to hit all MR=6 variants
    m: [1, 2, 3, 4, 5, 6, 7, 12, 13, 192, 193]
    n: [64]  # Standard NR
    k: [64]
    alpha: [3.0]
    beta: [0.0, 3.0]
    mtagA: ["none"]
    mtagB: ["none"]
    tolerances:
      absolute: 0.001
      relative: 0.001
    fill_value:
      lb: -10
      ub: 10
      dist: "uniform"

  # ==========================================================================
  # Test Set 2: NR Register Allocation Variants (NR=64 specific)
  # Tests all N fringe cases for NR=64
  # ==========================================================================
  - name: "f32f16_nr_variants_avx512"
    a_type: ["f32"]
    b_type: ["fp16"]
    c_type: ["f32"]
    acc_type: ["f32"]
    storage_format: ["row-major"]
    transA: [false]
    transB: [false]
    m: [6, 12]
    # N values around NR=64 boundaries and sub-panels (32, 16)
    n: [1, 8, 15, 16, 24, 31, 32, 40, 47, 48, 56, 63, 64, 65, 80, 96, 128]
    k: [64]
    alpha: [3.0]
    beta: [0.0, 3.0]
    mtagA: ["none"]
    mtagB: ["none"]
    tolerances:
      absolute: 0.001
      relative: 0.001
    fill_value:
      lb: -10
      ub: 10
      dist: "uniform"

