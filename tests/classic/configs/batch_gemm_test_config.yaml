    a_type: "fp16"
    b_type: "fp16"
    c_type: "fp16"
    acc_type: "fp16"
    storage_format: "row_major"
    m: [1, 8, 16, 32, 64]
    n: [16, 32, 64]
    k: [16, 32, 64, 128]
    alpha: 1.0
    beta: [0.0, 1.0]
    transA: [false, true]
    transB: [false, true]
