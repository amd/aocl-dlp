    beta: 0
    transA: false
    transB: false
    mtagA: "none"
    mtagB: "none"
    group_size: 2


  # ============================================================================
  # FP16 output (f16f16f16of16)
  # ============================================================================

  # --------------------------------------------------------------------------
  # RELU
  # --------------------------------------------------------------------------

  - name: "FP16of16_SingleGroup_RELU_basic"
    product_type: "cartesian"
    a_type: "fp16"
    b_type: "fp16"
    c_type: "fp16"
    acc_type: "fp16"
    storage_format: "row_major"
    m: [1, 8, 16, 32, 64]
    n: [16, 32, 64]
    k: [16, 32, 64, 128]
    alpha: 1.0
    beta: 0.0
    transA: false
    transB: [false, true]
    mtagA: "none"
    mtagB: "none"
    group_size: 4
    tolerances:
      relative: 1.0e-1
      absolute: 1.0e-1
    post_operations:
      cartesian: false
      operations:
        - type: "Elementwise-RELU"

  - name: "FP16of16_MultiGroup_RELU"
    product_type: "simple"
    a_type: "fp16"
    b_type: "fp16"
    c_type: "fp16"
    acc_type: "fp16"
    storage_format: "row_major"
    m: [8, 32, 64, 128]
    n: [16, 32, 64, 128]
    k: [16, 64, 128, 256]
    alpha: 1.0
    beta: 0.0
    transA: false
    transB: false
    mtagA: "none"
    mtagB: "none"
    group_size: [1, 2, 4, 8]
