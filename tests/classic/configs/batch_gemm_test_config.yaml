    a_type: "u8"
    b_type: "s8"
    c_type: "u8"
    acc_type: "s32"
    storage_format: "row_major"
    m: 16
    n: 16
    k: 16
    alpha: 1
    beta: 0
    transA: false
    transB: false
    mtagA: "none"
    mtagB: "none"
    group_size: 2

  # ==========================================================================
  # INT8 BATCH TESTS (s8s8)
  # ==========================================================================

  - name: "SingleGroup_S8S8_S32_Output"
    product_type: "cartesian"
    a_type: "s8"
    b_type: "s8"
    c_type: "s32"
    acc_type: "s32"
    storage_format: "row_major"
    m: 16
    n: 16
    k: 16
    alpha: 1
    beta: 0
    transA: false
    transB: false
    mtagA: "none"
    mtagB: "none"
    group_size: 2

  - name: "SingleGroup_S8S8_S8_Output"
    product_type: "cartesian"
    a_type: "s8"
    b_type: "s8"
