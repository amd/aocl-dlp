    c_type: "fp16"
    acc_type: "fp16"
    storage_format: "row_major"
    m: [1, 5, 11, 15, 17, 23, 31]
    n: [5, 11, 15, 17, 23, 31]
    k: [16, 32, 64]
    alpha: 1.0
    beta: 0.0
    transA: false
    transB: false
    mtagA: "none"
    mtagB: "none"
    group_size: 2
