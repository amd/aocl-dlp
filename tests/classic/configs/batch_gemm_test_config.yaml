  # --------------------------------------------------------------------------

  - name: "FP16of16_SingleGroup_GELU_TANH"
    product_type: "cartesian"
    a_type: "fp16"
    b_type: "fp16"
    c_type: "fp16"
    acc_type: "fp16"
