  - name: "FP16of16_SingleGroup_RELU_large_batch"
    product_type: "cartesian"
    a_type: "fp16"
    b_type: "fp16"
    c_type: "fp16"
    acc_type: "fp16"
    storage_format: "row_major"
    m: [32, 64]
    n: [32, 64]
    k: [32, 64]
    alpha: 1.0
    beta: [0.0, 1.0]
    transA: false
    transB: false
    mtagA: "none"
    mtagB: "none"
