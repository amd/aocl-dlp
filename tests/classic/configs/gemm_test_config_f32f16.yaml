# F32×FP16→F32 GEMM - Mixed Precision Testing
# A and C are F32, B is FP16, accumulation is F32
#
# Key Configuration:
#   - a_type: ["f32"]
#   - b_type: ["fp16"]
#   - c_type: ["f32"]
#   - acc_type: ["f32"]
#   - NR = 64
#   - MR = 6
#   - KC = 2048
#
# ISA: AVX-512 + F16C
# Conversion: vcvtph2ps (FP16→F32 in kernel)
# FMA: vfmadd231ps (F32 accumulation)

gemm_tests:
  # ==========================================================================
  # Test Set 1: Main Kernel Tests (6x64)
  # ==========================================================================
  - name: "f32f16_main_kernel_6x64"
    a_type: ["f32"]
    b_type: ["fp16"]
    c_type: ["f32"]
    acc_type: ["f32"]
    storage_format: ["row-major"]
    transA: [false]
    transB: [false]
    m: [6, 12, 18, 24, 48]
    n: [64, 128, 192, 256]
    k: [16, 32, 64, 128]
    alpha: [1.0]
    beta: [0.0, 2.0]
    mtagA: ["none"]
    mtagB: ["none", "reorder", "pack"]
    tolerances:
      absolute: 0.01
      relative: 0.01
    fill_value:
      lb: -10
      ub: 10
      dist: "uniform"

  # ==========================================================================
  # Test Set 2: N-Fringe Tests
  # ==========================================================================
  - name: "f32f16_n_fringe"
    a_type: ["f32"]
    b_type: ["fp16"]
    c_type: ["f32"]
    acc_type: ["f32"]
    storage_format: ["row-major"]
    transA: [false]
    transB: [false]
    m: [6, 12]
    n: [1, 8, 16, 24, 32, 48, 63, 65]
    k: [16, 32]
    alpha: [1.0]
    beta: [0.0, 2.0]
    mtagA: ["none"]
    mtagB: ["none", "reorder"]
    tolerances:
      absolute: 0.01
      relative: 0.01
    fill_value:
      lb: -5
      ub: 5
      dist: "uniform"

  # ==========================================================================
