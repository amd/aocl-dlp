    transB: [false]
    m: [1, 2, 3, 4, 5, 7, 11, 13]
    n: [64, 128]
    k: [16, 32, 64]
    alpha: [1.0]
    beta: [0.0, 2.0]
    mtagA: ["none"]
    mtagB: ["none", "reorder"]
    tolerances:
      absolute: 0.01
