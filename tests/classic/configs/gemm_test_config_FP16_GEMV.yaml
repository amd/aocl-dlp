# ==========================================================================
# FP16 GEMV (General Matrix-Vector Multiplication) Test Configuration
# ==========================================================================
#
# GOLD STANDARD TESTING MODE
# ==========================
# This configuration is designed for USE_GOLD_STANDARD=1 testing, which
# compares the JIT kernel against a mathematically correct sequential
# accumulation reference (not a kernel-matching reference).
#
# FP16 ACCUMULATION ERROR ANALYSIS
# ================================
# FP16 format: 1 sign + 5 exponent + 10 mantissa bits
# Machine epsilon: ε = 2^(-10) ≈ 0.001 (0.1%)
#
# The JIT kernel uses K_SUB_ITER=4 strided accumulation for software
# pipelining, while the gold standard reference uses sequential accumulation.
# Different accumulation orders produce different rounding errors in FP16.
#
# Expected relative error formula:
#   Error ≈ C × √K × ε
# Where:
#   - C = safety factor (2x for worst-case scenarios)
#   - K = number of FMA operations
#   - ε = FP16 machine epsilon ≈ 0.001
#
# FP16 OVERFLOW LIMITATIONS
# =========================
# FP16 has a maximum representable value of ~65504. When using FP16
# accumulation (acc_type=fp16), the native vfmadd231ph instruction
# accumulates entirely in FP16 precision. For large K values, intermediate
# partial sums can exceed this limit, causing overflow to infinity (inf).
#
# To avoid overflow, input value ranges must be constrained based on K:
#   - For K ≤ 128:  inputs in [-10, 20] are safe (20^2 * 128 = 51200)
#   - For K ≤ 256:  inputs in [-5, 10] recommended (10^2 * 256 = 25600)
#   - For K ≤ 1024: inputs in [-5, 7] recommended (7^2 * 1024 = 50176)
#   - For K > 1024: inputs in [-2, 3] required (3^2 * 4097 = 36873)
#
# The constraint comes from: sum(A[i] * B[i]) for i in [0,K) must be < 65504
# With uniform random inputs in [lb, ub], expected sum ≈ K * E[A] * E[B]
# Safety rule: K * (max(|lb|, |ub|))^2 < 65504
#
# TOLERANCE CALCULATION TABLE
# ===========================
# | K Range   | √K   | Relative Tol | Absolute Tol | Notes              |
# |-----------|------|--------------|--------------|---------------------|
# | K ≤ 16    | 4    | 0.01 (1%)    | 0.1          | Near bit-exact      |
# | K ≤ 64    | 8    | 0.02 (2%)    | 1.0          | Small accumulation  |
# | K ≤ 128   | 11   | 0.025 (2.5%) | 2.0          | Moderate K          |
# | K ≤ 256   | 16   | 0.035 (3.5%) | 5.0          | Standard GEMV       |
# | K ≤ 512   | 23   | 0.05 (5%)    | 10.0         | Large K             |
# | K ≤ 1024  | 32   | 0.07 (7%)    | 20.0         | Very large K        |
# | K > 1024  | 45+  | 0.10 (10%)   | 50.0         | Stress tests        |
#
# Note: Absolute tolerance scales with input value range and K.
#       With inputs in [-10, 20], accumulated values ≈ K×avg(|A|)×avg(|B|).
#
# KERNEL DETAILS
# ==============
# M=1 case: y = x * B (1xK vector * KxN matrix = 1xN vector)
#   - Uses K_SUB_ITER=4 software pipelining
#   - NR = 128 (4 ZMM × 32 FP16 elements)
#   - KC = 2048 for K-blocking
#
# N=1 case: y = A * x (MxK matrix * Kx1 vector = Mx1 vector)
#   - Uses MR=16 for vectorized row processing
#   - 32-lane SIMD accumulation, then horizontal sum
#
# Architecture: AMD Zen 4+ with AVX512-FP16 (vfmadd231ph)
# ==========================================================================

gemm_tests:
  # ==========================================================================
  # TEST SET 1: M=1 Basic Tests (Vector-Matrix Multiplication)
  # K range: 16-128, use moderate tolerance
  # ==========================================================================
  - name: "fp16_gemv_m1_basic"
    a_type: ["fp16"]
    b_type: ["fp16"]
    c_type: ["fp16"]
    acc_type: ["fp16"]
    storage_format: ["row-major"]
    transA: [false]
    transB: [false]
    m: [1]
    n: [32, 64, 96, 128, 160, 192, 224, 256]
    k: [16, 32, 64, 128]
    alpha: [0.0, 2.0]
    beta: [0, 1]
    mtagA: ["none"]
    mtagB: ["none", "reorder"]
    # Tolerance for K≤128: K_SUB_ITER=4 strided accumulation vs sequential
    # produces O(sqrt(K)*eps) error. Max observed relative error ~0.5% for K=128.
    # Using multiplier format: actual_tol = multiplier * eps * sqrt(K)
    tolerances:
      absolute: 10
      relative: 10
    fill_value:
      lb: -10
      ub: 20
      dist: "uniform"

  # ==========================================================================
  # TEST SET 2: M=1 NR=128 Full Register Tests
  # K range: 32-256, use moderate-high tolerance
  # ==========================================================================
  - name: "fp16_gemv_m1_nr128_multiples"
