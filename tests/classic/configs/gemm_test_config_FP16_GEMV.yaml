  # ==========================================================================
  # TARGETED ISSUE-PROBING TESTS
  # ==========================================================================
  # The following test sets use TIGHT TOLERANCES and are specifically designed
  # to surface potential bugs in the FP16 GEMV JIT generators. Each test set
  # targets a specific code path or concern identified during code review.
  #
  # Key design principles:
  #   - Small K values (K <= 16) so FP16 accumulation error is negligible
  #   - Small input values (integers in [-3, 3]) so results are exact in FP16
  #   - Very tight tolerances (absolute: 0.01, relative: 0.01)
  #   - Specific alpha/beta combinations to exercise all scaling branches
  # ==========================================================================

  # ==========================================================================
  # PROBE 1: M=1 GEMV - Secondary Panel Pointer (regTmpYptr) Correctness
  # ==========================================================================
  # Targets: compute1xnfringe() / computeKxnfringe() in fp16_gemv_generator.cc
  #
  # When nfringe=true with PACKED/REORDERED B and N_LEFT > 32, the kernel
  # uses regTmpYptr to address a "secondary panel" (the <32 leftover).
  # loopKSubIter() unconditionally advances regTmpYptr by RegBytes in the
  # sub-iteration fringe loop (lines 398-400, 436-438). If the secondary
  # panel pointer is incorrectly offset, the loaded B values will be wrong.
  #
  # Test strategy:
  #   - N values that produce N_LEFT in (33..127) with a non-zero remainder
  #     mod 32, so both primary and secondary panels are used.
  #   - K values that exercise both the K_SUB_ITER=4 main loop AND the
  #     sub-iteration remainder (K not divisible by 4).
  #   - Both REORDERED and UNPACKED B to compare results.
  # ==========================================================================
  - name: "probe_m1_secondary_panel_basic"
    a_type: ["fp16"]
    b_type: ["fp16"]
    c_type: ["fp16"]
    acc_type: ["fp16"]
    storage_format: ["row-major"]
    transA: [false]
    transB: [false]
    m: [1]
    # N_LEFT = N % 128. Pick N so N_LEFT has both full ZMMs and a remainder:
    # N=161: N_LEFT=33 (1 full ZMM + 1 element)
    # N=175: N_LEFT=47 (1 full ZMM + 15 elements)
    # N=192: N_LEFT=64 (2 full ZMMs, no remainder - control case)
    # N=210: N_LEFT=82 (2 full ZMMs + 18 elements)
    # N=250: N_LEFT=122 (3 full ZMMs + 26 elements)
    n: [161, 175, 192, 210, 250]
    # K=5: exercises K_SUB_ITER main loop (5/4=1) + sub-iter remainder (5%4=1)
    # K=7: exercises main loop (7/4=1) + remainder (7%4=3)
    # K=9: exercises main loop (9/4=2) + remainder (9%4=1)
    k: [5, 7, 9]
    alpha: [1.0]
    beta: [0.0]
    mtagA: ["none"]
    mtagB: ["reorder"]
    tolerances:
      absolute: 0.01
      relative: 0.01
    fill_value:
