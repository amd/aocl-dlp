  # ==========================================================================
  # PROBE 4: N=1 GEMV - Column Advancement and K-Blocking
  # ==========================================================================
  # Targets: generateIrLoop() in fp16_gemv_generator.cc (lines 1335-1399)
  #
  # The N=1 GEMV loads A rows as vectors (32 FP16 per ZMM) and advances
  # the column pointer by RegBytes (64 bytes) per K iteration. After the
  # K-loop, it does a horizontal reduction of 32 partial sums -> 1 scalar.
  #
  # regTmpYptr tracks column position (line 1346):
  #   mov(regTmpYptr, regAptr);  // Track column position
