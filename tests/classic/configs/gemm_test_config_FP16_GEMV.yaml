    transB: [false]
    m: [1]
    n: [128, 256, 384, 512, 640, 768]
    k: [32, 64, 128, 256]
    alpha: [1.0]
    beta: [0.0, 2.0]
    mtagA: ["none"]
    mtagB: ["none", "reorder"]
    # Tolerance for K≤256: using multiplier format for FP16 accumulation order differences
    tolerances:
      absolute: 10
      relative: 10
    # Inputs in [-5,10]: max^2 * K_max = 100 * 256 = 25600 < 65504
    fill_value:
      lb: -5
      ub: 10
      dist: "uniform"

