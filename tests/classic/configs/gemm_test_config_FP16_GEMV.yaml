  # ==========================================================================
  # PROBE 7: N=1 GEMV - Horizontal Reduction Correctness
  # ==========================================================================
  # Targets: reduceAccToScalar() in fp16_gemv_generator.cc (lines 1152-1185)
  #
  # The horizontal reduction uses 5 steps:
  #   ZMM(32 FP16) -> YMM(16) -> XMM(8) -> 4 -> 2 -> 1
  # Steps 3 and 4 use vpermilps (32-bit shuffle) on 16-bit FP16 data.
  #
  # Step 3: vpermilps(tmp, acc, 0xEE) shuffles as 32-bit floats
  #   This moves the upper 4 FP16 (bytes 8-15) to the lower position
  #   0xEE = 11_10_11_10 -> selects dwords [2,3,2,3]
  #
  # Step 4: vpermilps(tmp, acc, 0x55) = [1,1,1,1]
  #   This moves bytes 4-7 to bytes 0-3
  #
  # These are correct for FP16 because vpermilps shuffles at 32-bit
  # granularity, which moves pairs of FP16 values together, and the
  # subsequent vaddph adds all lanes including the ones we don't care about.
  #
  # Test strategy:
  #   - K=32 so we fill exactly one ZMM (32 FP16 elements)
  #   - Known pattern where all 32 partial products are distinct
  #   - Various M values to test both main loop and fringe
  #   - Result should equal sum of all 32 products exactly
  # ==========================================================================
  - name: "probe_n1_horizontal_reduction"
    a_type: ["fp16"]
    b_type: ["fp16"]
    c_type: ["fp16"]
    acc_type: ["fp16"]
    storage_format: ["row-major"]
    transA: [false]
    transB: [false]
    m: [1, 2, 15, 16, 17, 31, 32, 33]
    n: [1]
    # K=32: exactly fills one ZMM, exercises full reduction chain
    # K=33: fills one ZMM + 1 element in fringe, tests masked load + reduction
    k: [32, 33]
    alpha: [1.0]
    beta: [0.0, 1.0]
    mtagA: ["none"]
    mtagB: ["none"]
    tolerances:
      absolute: 0.01
      relative: 0.01
    fill_value:
      lb: -2
      ub: 2
      dist: "uniform"

  # Test reduction with alpha scaling applied after reduction
  - name: "probe_n1_reduction_with_alpha"
    a_type: ["fp16"]
    b_type: ["fp16"]
    c_type: ["fp16"]
    acc_type: ["fp16"]
    storage_format: ["row-major"]
    transA: [false]
    transB: [false]
    m: [1, 16, 17, 32]
    n: [1]
    k: [32, 33]
    alpha: [0.5, 2.0]
    beta: [0.0, 0.5, 1.0]
    mtagA: ["none"]
    mtagB: ["none"]
    tolerances:
      absolute: 0.01
      relative: 0.01
    fill_value:
      lb: -2
      ub: 2
      dist: "uniform"

  # ==========================================================================
  # ==========================================================================
  # PROBE 8: N=1 GEMV - Row-Stored Y with Strided ldc
  # ==========================================================================
  # Targets: scaleYWithBeta_FP16(isRowStored=true) and storeY_rowStored_FP16()
  # in fp16_gemv_generator.cc
  #
  # When storage_format=row-major and n=1, the C (Y) vector has:
  #   rs_c = ldc,  cs_c = 1
  # So Y[i] lives at address Y + i * ldc * sizeof(fp16).
  # When ldc > 1 there are gaps between Y elements.
  #
  # scaleYWithBeta_FP16 loads Y via:
  #   vpbroadcastw(Xmm(yBaseIdx), ptr[regTmpYptr + i * regRsC])
  # storeY_rowStored_FP16 stores via:
  #   vpextrw(ptr[regTmpYptr + i * regRsC], Xmm(accumBaseIdx+i), 0)
  #
  # If the stride calculation (imul regTmp1, regRsC) is wrong, or if
  # regRsC was not correctly scaled by sizeof(uint16_t), the load/store
  # will read/write wrong memory.
  #
  # The deleted rearrangeY_rowStored_FP16 was a separate function doing
  # exactly the same load pattern. We verify the inline version is correct.
  #
  # Test strategy:
  #   - Small K so accumulation is exact
  #   - ldc values of 2, 3, 5, 7 (non-power-of-2 to catch alignment issues)
  #   - beta != 0 to exercise the Y-load path
  #   - Zero tolerance since small integers are FP16-exact
  # ==========================================================================

  # Basic: MR-aligned M, simple K, strided ldc, beta=1
  - name: "probe_n1_strided_y_beta1_exact"
    a_type: ["fp16"]
    b_type: ["fp16"]
    c_type: ["fp16"]
    acc_type: ["fp16"]
    storage_format: ["row-major"]
    transA: [false]
    transB: [false]
    m: [1, 2, 8, 15, 16, 17, 31, 32, 33]
    n: [1]
    k: [1, 2, 4, 8]
    ldc: [2, 3, 5, 7]
    alpha: [1.0]
    beta: [1.0]
    mtagA: ["none"]
    mtagB: ["none"]
    tolerances:
      absolute: 0.0
      relative: 0.0
    fill_value:
      lb: -3
      ub: 3
      dist: "uniform"

  # Non-unit beta: exercises the vmulph(Y, beta) + vfmadd path
  - name: "probe_n1_strided_y_beta_nonunit"
    a_type: ["fp16"]
    b_type: ["fp16"]
    c_type: ["fp16"]
    acc_type: ["fp16"]
    storage_format: ["row-major"]
    transA: [false]
    transB: [false]
    m: [1, 2, 15, 16, 17, 32, 33]
    n: [1]
    k: [1, 4]
    ldc: [2, 3, 5, 7]
    alpha: [1.0, 2.0]
    beta: [0.5, 2.0]
    mtagA: ["none"]
    mtagB: ["none"]
    tolerances:
      absolute: 0.01
      relative: 0.01
    fill_value:
      lb: -3
      ub: 3
      dist: "uniform"

  # Beta=0 with strided ldc: Y is not loaded, only stored via stride
  - name: "probe_n1_strided_y_beta0_store_only"
    a_type: ["fp16"]
    b_type: ["fp16"]
    c_type: ["fp16"]
    acc_type: ["fp16"]
    storage_format: ["row-major"]
    transA: [false]
    transB: [false]
    m: [1, 2, 15, 16, 17, 32, 33]
    n: [1]
    k: [1, 4, 8]
    ldc: [2, 3, 5, 7]
    alpha: [1.0]
    beta: [0.0]
    mtagA: ["none"]
    mtagB: ["none"]
    tolerances:
      absolute: 0.0
      relative: 0.0
    fill_value:
      lb: -3
      ub: 3
      dist: "uniform"

  # Column-major comparison: same dimensions but col-stored Y
  # For col-major with n=1: cs_c = ldc, rs_c = 1 => Y is contiguous
  # This serves as a control group to verify row-stored results match
  - name: "probe_n1_colmajor_y_comparison"
    a_type: ["fp16"]
    b_type: ["fp16"]
    c_type: ["fp16"]
    acc_type: ["fp16"]
    storage_format: ["column-major"]
    transA: [false]
    transB: [false]
    m: [1, 2, 15, 16, 17, 32, 33]
    n: [1]
    k: [1, 4, 8]
    lda: [64]
    ldb: [64]
    ldc: [64]
    alpha: [1.0]
    beta: [0.0, 1.0, 2.0]
    mtagA: ["none"]
    mtagB: ["none"]
    tolerances:
      absolute: 0.0
      relative: 0.0
    fill_value:
      lb: -3
      ub: 3
      dist: "uniform"

  # Large ldc: stress-test with wide gaps between Y elements
  # ldc=64,128 means each Y[i] is 128/256 bytes apart
  - name: "probe_n1_strided_y_large_ldc"
    a_type: ["fp16"]
    b_type: ["fp16"]
    c_type: ["fp16"]
    acc_type: ["fp16"]
    storage_format: ["row-major"]
    transA: [false]
    transB: [false]
    m: [16, 32, 33, 47]
    n: [1]
    k: [4, 8, 16]
    ldc: [64, 128, 256]
    alpha: [1.0]
    beta: [0.0, 1.0, 0.5]
    mtagA: ["none"]
    mtagB: ["none"]
    tolerances:
      absolute: 0.01
      relative: 0.01
    fill_value:
      lb: -3
      ub: 3
      dist: "uniform"

  # Combined: strided Y + alpha scaling + MR fringe
  # Alpha != 1 means scaleAlpha runs before storeResult
  - name: "probe_n1_strided_y_alpha_scaling"
    a_type: ["fp16"]
    b_type: ["fp16"]
    c_type: ["fp16"]
    acc_type: ["fp16"]
    storage_format: ["row-major"]
    transA: [false]
    transB: [false]
    m: [1, 15, 16, 17, 31, 32, 33]
    n: [1]
    k: [1, 4]
    ldc: [3, 5, 7]
    alpha: [0.5, 2.0]
    beta: [0.0, 1.0, 0.5]
    mtagA: ["none"]
    mtagB: ["none"]
    tolerances:
      absolute: 0.01
      relative: 0.01
    fill_value:
      lb: -3
      ub: 3
      dist: "uniform"

  # Strided Y with packed A: exercises the PACK path for A + strided Y store
  - name: "probe_n1_strided_y_packed_a"
    a_type: ["fp16"]
    b_type: ["fp16"]
    c_type: ["fp16"]
    acc_type: ["fp16"]
    storage_format: ["row-major"]
    transA: [false]
    transB: [false]
    m: [16, 32, 33, 47]
    n: [1]
    k: [4, 8, 16]
    ldc: [3, 5, 7]
    alpha: [1.0]
    beta: [0.0, 1.0]
    mtagA: ["none", "pack"]
    mtagB: ["none"]
    tolerances:
      absolute: 0.01
      relative: 0.01
    fill_value:
      lb: -3
      ub: 3
      dist: "uniform"

  # ==========================================================================
  # ==========================================================================
  # SPECIAL FLOATING-POINT VALUE TESTS (NaN / Infinity)
  # ==========================================================================
  # BLAS spec requires:
  #   - beta=0: C (Y) must NOT be read (prevents 0*NaN=NaN propagation)
  #   - alpha=0: A*B product must be skipped (prevents Inf*0=NaN)
  #   - alpha=0, beta=0: Y = 0 (all zeros, regardless of input)
  # ==========================================================================

  # M=1 GEMV: C filled with NaN, A/B with Inf, beta=0 should zero out NaN
  - name: "fp16_gemv_m1_nan_inf"
    a_type: ["fp16"]
    b_type: ["fp16"]
    c_type: ["fp16"]
    acc_type: ["fp16"]
    storage_format: ["row-major", "column-major"]
    transA: [false]
    transB: [false]
    m: [1]
    n: [32, 64, 128, 161]
    k: [32, 64]
    alpha: [1.0]
    beta: [0.0, 1.0]
    mtagA: ["none"]
    mtagB: ["none", "reorder"]
    fill_pattern:
      - type: "static"
        values: [.NaN]
        apply_matrix: ["C"]
      - type: "static"
        values: [.inf]
        apply_matrix: ["A", "B"]
    tolerances:
      absolute: 0
      relative: 0

  # N=1 GEMV: same NaN/Inf test
  - name: "fp16_gemv_n1_nan_inf"
    a_type: ["fp16"]
    b_type: ["fp16"]
    c_type: ["fp16"]
    acc_type: ["fp16"]
    storage_format: ["row-major", "column-major"]
    transA: [false]
    transB: [false]
    m: [1, 16, 17, 32, 33]
    n: [1]
    k: [32, 64]
    alpha: [1.0]
    beta: [0.0, 1.0]
    mtagA: ["none"]
    mtagB: ["none"]
    fill_pattern:
      - type: "static"
        values: [.NaN]
        apply_matrix: ["C"]
      - type: "static"
        values: [.inf]
        apply_matrix: ["A", "B"]
    tolerances:
      absolute: 0
      relative: 0

  # Alpha=0: A/B with Inf should NOT produce NaN (K-loop skipped)
  - name: "fp16_gemv_m1_alpha_zero_inf"
    a_type: ["fp16"]
    b_type: ["fp16"]
    c_type: ["fp16"]
    acc_type: ["fp16"]
    storage_format: ["row-major"]
    transA: [false]
    transB: [false]
    m: [1]
    n: [32, 64, 128, 161]
    k: [32, 64]
    alpha: [0.0]
    beta: [0.0, 1.0, 2.0]
    mtagA: ["none"]
    mtagB: ["none", "reorder"]
    fill_pattern:
      - type: "static"
        values: [.inf]
        apply_matrix: ["A", "B"]
      - type: "static"
        values: [1.0]
        apply_matrix: ["C"]
    tolerances:
      absolute: 0
      relative: 0

  - name: "fp16_gemv_n1_alpha_zero_inf"
    a_type: ["fp16"]
    b_type: ["fp16"]
    c_type: ["fp16"]
    acc_type: ["fp16"]
    storage_format: ["row-major"]
    transA: [false]
    transB: [false]
    m: [1, 16, 17, 32, 33]
    n: [1]
    k: [32, 64]
    alpha: [0.0]
    beta: [0.0, 1.0, 2.0]
    mtagA: ["none"]
    mtagB: ["none"]
    fill_pattern:
      - type: "static"
        values: [.inf]
        apply_matrix: ["A", "B"]
      - type: "static"
        values: [1.0]
        apply_matrix: ["C"]
    tolerances:
      absolute: 0
      relative: 0
