  # ==========================================================================
  # PROBE 2: M=1 GEMV - Alpha * Beta Double-Rounding
  # ==========================================================================
  # Targets: scaleYWithBeta() in fp16_gemv_generator.cc (lines 507-567)
  #
  # When beta != 0 AND beta != 1, Y is first scaled by beta via vmulph
  # (one rounding), then the result is combined with acc via vfmadd132ph
  # or vaddph (another rounding). This is two rounding points.
