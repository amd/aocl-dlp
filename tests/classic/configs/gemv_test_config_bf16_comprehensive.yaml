gemm_tests:
  # ============================================================================
  # GEMV M=1 (Matrix-Vector: y = alpha * A * x + beta * y)
  # Blocking parameters: NR=16, NC=8160, KC=512
  # ============================================================================

  # --- M=1: Corner cases (K dimension) ---
  - name: "bf16_m1_k_corner_cases"
    a_type: ["bf16"]
    b_type: ["bf16"]
    c_type: ["f32","bf16"]
    acc_type: ["f32"]
    storage_format: ["row-major"]
    transA: [false, true]
    transB: [false, true]
    m: 1
    n: [16, 32, 64, 128]
    k: [1, 2, 4, 7, 8, 15, 16, 31, 32, 63, 64]  # Small values and powers of 2
    alpha: [0.0, 1.0, 2.0, 100.0]
    beta: [0.0, 1.0, 100.0, -100.0]
    mtagA: ["none"]
    mtagB: ["none", "reorder"]
    tolerances:
      absolute: 0
      relative: 0

  # --- M=1: K around KC boundary (KC=512) ---
