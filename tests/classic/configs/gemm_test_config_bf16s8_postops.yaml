# BF16×S8→BF16 Post-Operations Tests
# Coverage: All post-ops, symmetric/asymmetric quantization, BIAS/SCALE, LLM patterns
# ZEN4 params: MC=144, NC=1024, KC=2048, MR=6, NR=64

gemm_tests:
  # Individual post-ops with symmetric A_Quant (scale factors only)

  # Test 0: RELU
  - name: "bf16s8_postops_relu"
    a_type: ["bf16"]
    b_type: ["s8"]
    c_type: ["bf16"]
    acc_type: ["s32"]
    storage_format: ["row-major"]
    transA: [false]
    transB: [false]
    m: [1, 6, 32, 145]  # GEMV M=1, Kernel size and standard size
    n: [1, 15, 16, 64, 1025] # GEMV N=1, NR variants
    k: [4, 32, 512]
    alpha: [1.0]
    beta: [0.0]
    mtagA: ["none"]
    mtagB: ["none"]
    tolerances:
      float: 1.0e-5
      bfloat16: 1.0e-2
      int32: 0
    post_operations:
      cartesian: false
      operations:
        - type: "A_Quant"
          params:
            a_quant_sf_len: ["1"]
            a_quant_sf_type: ["f32"]
        - type: "Elementwise-RELU"
          params: {}

  # Test 1: PRELU
