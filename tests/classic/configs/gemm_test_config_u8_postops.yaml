# U8S8 Post-Operations Test Configuration
# Target: Comprehensive post-ops testing for u8s8 GEMM/GEMV implementations
# Focus: All post-operations with u8s8 data types and various output formats
# Note: GEMM functionality is assumed working - this tests post-ops integration
# Important: Post-ops operate on S32 accumulators, so all parameter types are S32

gemm_tests:
  # ==========================================================================
  # INDIVIDUAL POST-OPS TESTS - U8S8 GEMM
  # ==========================================================================

  # Test 0: RELU post-op with all output types
  - name: "u8s8_postops_relu"
    a_type: ["u8"]
    b_type: ["s8"]
    c_type: ["s32", "f32", "bf16", "s8", "u8"]
    # c_type: ["u8"]
    acc_type: ["s32"]
    storage_format: ["row-major"]
    transA: [false]
    transB: [false]
    m: [1, 6, 32, 145]  # GEMV M=1, Kernel size and standard size
    n: [1, 15, 16, 64, 1025] # GEMV N=1, NR variants
    k: [5, 33, 2049]  # VNNI aligned
    alpha: [2]
    beta: [2]
    lda: [2049]
    ldb: [1, 1025]
    ldc: [1, 1025]
    mtagA: ["none"]
    mtagB: ["none"]
    tolerances:
      float: 1.0e-5
      bfloat16: 1.0e-2
      int8: 0
    post_operations:
      cartesian: true
      operations:
        - type: "Elementwise-RELU"
          params:
            alpha_type: ["f32"]
            alpha: 1

  # Test 1: PRELU post-op with different alpha values
  - name: "u8s8_postops_prelu"
    a_type: ["u8"]
    b_type: ["s8"]
    c_type: ["s32", "f32", "bf16", "s8", "u8"]
    # c_type: ["s32"]
    acc_type: ["s32"]
    storage_format: ["row-major"]
    transA: [false]
    transB: [false]
    m: [1, 6, 32, 145]  # GEMV M=1, Kernel size and standard size
    n: [1, 16, 64, 1025] # GEMV N=1, NR variants
    k: [4, 32, 2049]
    alpha: [1.0]
    beta: [1.0]
    lda: [2049]
    ldb: [1025]
    ldc: [1025]
    mtagA: ["none"]
    mtagB: ["none"]
    tolerances:
      float: 1.0e-5
      bfloat16: 1.0e-2
      int8: 0
    post_operations:
      cartesian: true
      operations:
        - type: "Elementwise-PRELU"
          params:
            alpha_type: ["f32"]
            alpha: [2]

  # Test 2: GELU-TANH post-op
