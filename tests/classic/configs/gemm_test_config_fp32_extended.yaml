# GEMM FP32 Weekly Test Configuration
# Target: Comprehensive systematic sweep of dimension space
# Focus: FP32 data type with exhaustive dimension coverage
#
# Architecture Parameters (ZEN4):
#   MC=192, NC=8064, KC=512, MR=6, NR=64 (AVX512)

gemm_tests:
  # ==========================================================================
  # Test Set 1: Systematic M Sweep
  # ==========================================================================
  - name: "fp32_extended_m_sweep"
    a_type: ["f32"]
    b_type: ["f32"]
    c_type: ["f32"]
    acc_type: ["f32"]
    storage_format: ["row-major"]
    transA: [false]
    transB: [false]
    m:
      lb: 1
      ub: 385
      step: 4
    n: [64, 128, 256]
    k: [64, 512]
    alpha: [1.0]
    beta: [0.0, 1.0]
    mtagA: ["none"]
    mtagB: ["none"]
    tolerances:
      float: 1.0e-5
      bfloat16: 1.0e-2

  # ==========================================================================
  # Test Set 2: Systematic N Sweep - Small Range
  # ==========================================================================
  - name: "fp32_extended_n_sweep_small"
    a_type: ["f32"]
    b_type: ["f32"]
    c_type: ["f32"]
    acc_type: ["f32"]
    storage_format: ["row-major"]
    transA: [false, true]
    transB: [false, true]
    m: [6, 12, 192]
    n:
      lb: 1
      ub: 256
      step: 32
    k: [64, 512]
    alpha: [1.0]
    beta: [0.0, 1.0]
    mtagA: ["none"]
    mtagB: ["none"]
    tolerances:
      float: 1.0e-5
      bfloat16: 1.0e-2

  # ==========================================================================
  # Test Set 3: Systematic N Sweep - Large Range
  # ==========================================================================
  - name: "fp32_extended_n_sweep_large"
    a_type: ["f32"]
    b_type: ["f32"]
    c_type: ["f32"]
    acc_type: ["f32"]
    storage_format: ["row-major"]
    transA: [false]
    transB: [false, true]
    m: [6, 192, 384]
    n:
      lb: 256
      ub: 2048
      step: 200
    k: [64, 512]
    alpha: [1.0]
    beta: [0.0, 1.0]
    mtagA: ["none"]
    mtagB: ["none"]
    tolerances:
      float: 1.0e-5
      bfloat16: 1.0e-2

  # ==========================================================================
  # Test Set 4: Systematic K Sweep
  # ==========================================================================
  - name: "fp32_extended_k_sweep"
    a_type: ["f32"]
    b_type: ["f32"]
    c_type: ["f32"]
    acc_type: ["f32"]
    storage_format: ["row-major"]
    transA: [false, true]
    transB: [false, true]
    m: [6, 12, 192, 384]
    n: [64, 128, 256]
    k:
      lb: 1
      ub: 1025
      step: 100
    alpha: [1.0, -1.0]
    beta: [0.0, 1.0]
    mtagA: ["none"]
    mtagB: ["none"]
    tolerances:
      float: 1.0e-5
      bfloat16: 1.0e-2

  # ==========================================================================
  # Test Set 5: Combined Boundaries
  # ==========================================================================
  - name: "fp32_extended_combined_boundaries"
    a_type: ["f32"]
    b_type: ["f32"]
    c_type: ["f32"]
    acc_type: ["f32"]
    storage_format: ["row-major"]
    transA: [false, true]
    transB: [false, true]
    m: [1, 191, 192, 193, 383, 384]
    n: [64, 256, 8063, 8064]
    k: [1, 511, 512, 513, 1024]
    alpha: [1.0, -1.0]
    beta: [0.0, 1.0]
    mtagA: ["none"]
    mtagB: ["none"]
    tolerances:
      float: 1.0e-5
      bfloat16: 1.0e-2

  # ==========================================================================
  # Test Set 6: Alpha/Beta Comprehensive
  # Test Set 6: Alpha/Beta Comprehensive
  # ==========================================================================
  - name: "fp32_extended_alpha_beta_comprehensive"
    a_type: ["f32"]
    b_type: ["f32"]
    c_type: ["f32"]
    acc_type: ["f32"]
    storage_format: ["row-major"]
    transA: [false]
    transB: [false]
    m: [6, 192, 384]
    n: [64, 128, 256]
    k: [64, 512, 1024]
    alpha: [0.0, 1.0, -1.0, 2.0, 3.0]
    beta: [0.0, 1.0, -1.0]
    mtagA: ["none"]
    mtagB: ["none"]
    tolerances:
      float: 1.0e-5
      bfloat16: 1.0e-2
