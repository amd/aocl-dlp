# Optimized U8S8S32 JIT VNNI Test Configuration
# Target: Comprehensive systematic coverage with optimal test distribution
# Focus: All kernel variants, loop boundaries, and critical edge cases
#
# Architecture Parameters (ZEN4):
#   MC=144, NC=1024, KC=2048, MR=6 (GEMM), MR=16 (GEMV N=1), NR=64

gemm_tests:
  # ==========================================================================
  # Test Set 1: Systematic M Sweep (GEMM MR variants + small M)
  # Tests: All MR remainders (1-6) + small M coverage
  # ==========================================================================
  - name: "u8_m_sweep_small"
    a_type: ["u8"]
    b_type: ["s8"]
    # c_type: ["s32", "f32"]
    c_type: ["bf16", "s32"]
    acc_type: ["s32"]
    storage_format: ["row-major"]
    transA: [false]
    transB: [false]
    m: [1, 2, 3, 4, 5, 6, 7, 12, 24, 30]
    n: [1, 2, 15, 16, 17, 31, 32, 33, 63, 64, 65, 129, 1024, 1025]  # NR, 2×NR, NC boundaries
    k: [1, 2, 3, 4, 8, 2048, 2049]     # VNNI min, small, KC boundary
    alpha: [3.0]
    beta: [1.0]
    lda: [2049]
    ldb: [1025]
    ldc: [1025]
    mtagA: ["none"]
    mtagB: ["none", "reorder"]
    tolerances:
      float: 1.0e-5
      bfloat16: 0
      int8: 0

  - name: "u8_m_sweep_mc"
    a_type: ["u8"]
    b_type: ["s8"]
    c_type: ["s32", "bf16"]
    acc_type: ["s32"]
    storage_format: ["row-major"]
    transA: [false]
    transB: [false]
    m: [144, 145, 160, 174]
    n: [15, 16, 17, 31, 32, 33, 63, 64, 65, 129, 1024, 1025]  # NR, 2×NR, NC boundaries
    k: [1, 2, 3, 4, 8, 16, 17, 32, 33, 64, 65, 2048, 2049]
    alpha: [3.25]
    beta: [1.25]
    lda: [2049]
    ldb: [1025]
    ldc: [1025]
    mtagA: ["none"]
    mtagB: ["none"]
    tolerances:
      float: 1.0e-5
      bfloat16: 1.0e-2
      int8: 0

  # ==========================================================================
  # Test Set 2: Systematic N Sweep - Small (NR variants + masking)
  # Tests: All NR variants (mask 1-15, 1reg 16, 2reg 32, 3reg 48, 4reg 64)
  # ==========================================================================
  - name: "u8_n_sweep_small"
    a_type: ["u8"]
    b_type: ["s8"]
    c_type: ["s32", "bf16"]
    acc_type: ["s32"]
    storage_format: ["row-major"]
    transA: [false, true]
    transB: [false, true]
    m: [6, 7, 12, 13, 145]     # MR, 2×MR, MC
    n: [1, 2, 7, 15, 16, 17, 31, 32, 33, 63, 64, 65, 129]
    k: [4, 8, 16, 77]
    alpha: [2.75]
    beta: [0.75]
    lda: [145]
    ldb: [129]
    ldc: [129]
    mtagA: ["none"]
    mtagB: ["none", "reorder"]
    tolerances:
      float: 1.0e-5
      bfloat16: 1.0e-2
      int8: 0

  # ==========================================================================
  # Test Set 3: Systematic N Sweep - Large (NC boundaries)
  # Tests: Large N values around NC=1024 boundary
  # ==========================================================================
  - name: "u8_n_sweep_large"
    a_type: ["u8"]
    b_type: ["s8"]
    c_type: ["s32", "u8"]
    acc_type: ["s32"]
    storage_format: ["row-major"]
    transA: [false, true]
    transB: [false, true]
    m: [6, 7, 144, 145, 288]    # MR, MC, 2×MC
    n: [128, 129, 256, 512, 1023, 1024, 1025, 1500]
    k: [8, 17, 33]        # Small k
    alpha: [2.5]
    beta: [0.5]
    lda: [288]
    ldb: [1500]
    ldc: [1500]
    mtagA: ["none"]
    mtagB: ["none"]
    tolerances:
      float: 1.0e-5
      bfloat16: 1.0e-2
      int8: 0

  # ==========================================================================
  # Test Set 4: Kernel-Specific Fringe Coverage (Row-Major)
  # Tests: Explicit n=48 path and 9x32 rowvar path
  # ==========================================================================
  - name: "u8_n_fringe_48"
