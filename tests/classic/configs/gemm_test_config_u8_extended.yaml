    n: [16, 17, 64, 65, 1024, 1025]   # NR variants and NC
    k: [1, 2, 4, 8, 16]        # Small and KC
    alpha: [1.5]
    beta: [-0.5]
    lda: [16]
    ldb: [1025]
    ldc: [1025]
    mtagA: ["none"]
    mtagB: ["none", "reorder"]
    tolerances:
