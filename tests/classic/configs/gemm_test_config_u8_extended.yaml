  # Tests: K dimension around KC boundary
  # ==========================================================================
  - name: "u8_k_sweep_large"
    a_type: ["u8"]
    b_type: ["s8"]
    c_type: ["s32", "bf16"]
    acc_type: ["s32"]
    storage_format: ["row-major"]
    transA: [false]
    transB: [false]
    m: [6, 7, 12, 13, 144, 145]     # MR variants and MC
    n: [16, 17, 64, 128]    # NR variants
    k: [2049, 2081, 3073, 4096]
    alpha: [2.25]
    beta: [0.25]
    lda: [4096]
    ldb: [128]
    ldc: [128]
    mtagA: ["none"]
    mtagB: ["none"]
    tolerances:
      float: 1.0e-5
      bfloat16: 1.0e-2
