    acc_type: ["s32"]
    storage_format: ["row-major"]
    transA: [false]
    transB: [false]
    m: [384, 385, 768, 769]       # 2.67×MC, 5.33×MC
    n: [512, 513, 1024, 1025]      # 0.5×NC, 1×NC
    k: [512, 513, 2048, 2049, 4099, 4111]      # 0.25×KC, 1×KC
    alpha: [2.0]
    beta: [2.0]
    lda: [5000]
    ldb: [5000]
    ldc: [5000]
    mtagA: ["none"]
    mtagB: ["none"]
    tolerances:
      float: 1.0e-5
      bfloat16: 1.0e-2
      int8: 0

  # ==========================================================================
  # Test Set 12: Minimal Cases (Edge case validation)
  # Tests: Smallest possible valid operations
  # ==========================================================================
  - name: "u8s8s32_optimized_minimal_cases"
    a_type: ["u8"]
    b_type: ["s8"]
    c_type: ["s32", "bf16", "f32", "u8", "s8"]
    acc_type: ["s32"]
    storage_format: ["row-major"]
    transA: [false, true]
    transB: [false, true]
    m: [1, 2]           # Minimal M
    n: [1, 2]           # Minimal N
    k: [1, 4, 8]        # Minimal K including VNNI aligned
    alpha: [2.0]
    beta: [2.0]
    lda: [8, 16]
    ldb: [1, 8, 16]
    ldc: [1, 8, 16]
    mtagA: ["none"]
    mtagB: ["none", "pack", "reorder"]
    tolerances:
      float: 1.0e-5
      bfloat16: 1.0e-2
      int8: 0



