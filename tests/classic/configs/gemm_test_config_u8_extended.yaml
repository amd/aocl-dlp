  # ==========================================================================
  # Test Set 11: Large Scale Performance (Multi-block scenarios)
  # Tests: Large matrices that trigger multiple MC/NC/KC blocks
  # ==========================================================================
  - name: "u8s8s32_optimized_large_scale"
    a_type: ["u8"]
