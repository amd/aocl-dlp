      bfloat16: 1.0e-2
      int8: 0

  # ==========================================================================
  # Test Set 7: VNNI K Alignment (Critical for VNNI instruction correctness)
  # Tests: Detailed K alignment around VNNI group size = 4
  # ==========================================================================
  - name: "u8_vnni_alignment"
    a_type: ["u8"]
    b_type: ["s8"]
    c_type: ["s32", "bf16", "f32", "u8", "s8"]
    acc_type: ["s32"]
    storage_format: ["row-major"]
    transA: [false, true]
    transB: [false, true]
    m: [5, 6, 11, 12]          # Basic MR variants
    n: [16, 17, 64, 65, 127, 129]     # NR variants
    k: [1, 2, 3, 4, 5, 8, 9, 15, 16, 17, 32, 33]  # VNNI boundaries
    alpha: [1.75]
    beta: [-0.25]
    lda: [33]
    ldb: [129]
    ldc: [129]
    mtagA: ["none"]
    mtagB: ["none", "reorder"]
    tolerances:
      float: 1.0e-5
      bfloat16: 1.0e-2
      int8: 0

