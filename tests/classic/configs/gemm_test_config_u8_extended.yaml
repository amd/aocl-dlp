    acc_type: ["s32"]
    storage_format: ["row-major"]
    transA: [false]
    transB: [false]
    m: [9]
    n: [32]
    k: [4, 7]
    alpha: [3.75]
    beta: [1.75]
    lda: [8]
    ldb: [32]
    ldc: [32]
    mtagA: ["none"]
    mtagB: ["none"]
    tolerances:
      float: 1.0e-5
      bfloat16: 1.0e-2
      int8: 0

  # ==========================================================================
