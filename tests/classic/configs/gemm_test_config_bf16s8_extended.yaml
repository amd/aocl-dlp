# BF16×S8→BF16 Extended GEMM Tests
# Coverage: Dimensions, boundaries, quantization types, edge cases
# ZEN4 params: MC=144, NC=1024, KC=2048, MR=6, NR=64

gemm_tests:
  # Basic dimensions: kernel sizes, cache blocking parameters

  - name: "bf16s8_basic_dims"
    a_type: ["bf16"]
    b_type: ["s8"]
    c_type: ["bf16"]
    acc_type: ["s32"]
    storage_format: ["row-major"]
    transA: [false]
    transB: [false, true]
    m: [1, 6, 12, 32, 144, 288]  # 1, MR, 2*MR, standard, MC, 2*MC
    n: [1, 16, 64, 128, 1024]  # 1, NR variants, NC
    k: [64, 128, 512, 2048]  # NR, 2*NR, standard, KC
    alpha: [1.0]
    beta: [0.0, 1.0]
    mtagA: ["none"]
    mtagB: ["none", "reorder"]
    tolerances:
      absolute: 0
      relative: 0
    post_operations:
      operations:
        - type: "A_Quant"
          params:
            a_quant_sf_len: ["1"]
            a_quant_sf_type: ["f32"]
            a_quant_zp_len: ["1"]
            a_quant_zp_type: ["f32"]

  # Per-row quantization with F32 parameters (common case)

  - name: "bf16s8_quant_f32_perrow"
    a_type: ["bf16"]
    b_type: ["s8"]
    c_type: ["bf16"]
    acc_type: ["s32"]
    storage_format: ["row-major"]
    transA: [false]
    transB: [false]
    m: [6, 32, 144]
    n: [64, 1024]
    k: [128, 512]
    alpha: [1.0]
    beta: [0.0]
    mtagA: ["none"]
    mtagB: ["none"]
    tolerances:
      absolute: 0
      relative: 0
    post_operations:
      operations:
        - type: "A_Quant"
          params:
            a_quant_sf_len: ["1", "m"]
            a_quant_sf_type: ["f32"]
            a_quant_zp_len: ["1", "m"]
            a_quant_zp_type: ["f32"]

  # Quantization with alternate parameter types: S32, BF16, U8, S8

  - name: "bf16s8_quant_other_types"
    a_type: ["bf16"]
    b_type: ["s8"]
    c_type: ["bf16"]
    acc_type: ["s32"]
    storage_format: ["row-major"]
    transA: [false]
    transB: [false]
    m: [6, 32]
    n: [64]
    k: [64, 128]
    alpha: [1.0]
    beta: [0.0]
    mtagA: ["none"]
    mtagB: ["none"]
    tolerances:
      absolute: 0
      relative: 0
    post_operations:
      combinations:
        - operations:
            - type: "A_Quant"
              params:
                a_quant_sf_len: ["1"]
                a_quant_sf_type: ["s32"]
                a_quant_zp_len: ["1"]
                a_quant_zp_type: ["s32"]
        - operations:
            - type: "A_Quant"
              params:
                a_quant_sf_len: ["1"]
                a_quant_sf_type: ["bf16"]
                a_quant_zp_len: ["1"]
                a_quant_zp_type: ["bf16"]
        - operations:
            - type: "A_Quant"
              params:
                a_quant_sf_len: ["1"]
                a_quant_sf_type: ["u8"]
                a_quant_zp_len: ["1"]
                a_quant_zp_type: ["u8"]
        - operations:
            - type: "A_Quant"
              params:
                a_quant_sf_len: ["1"]
                a_quant_sf_type: ["s8"]
                a_quant_zp_len: ["1"]
                a_quant_zp_type: ["s8"]

  # GEMV M=1: Row vector × Matrix, includes fringe cases

  - name: "bf16s8_gemv_m1"
    a_type: ["bf16"]
    b_type: ["s8"]
    c_type: ["bf16"]
    acc_type: ["s32"]
    storage_format: ["row-major"]
    transA: [false]
    transB: [false]
    m: [1]
    n: [1, 16, 64, 65, 128, 1024, 1025]  # Include fringe cases
    k: [64, 128, 512, 2048]
    alpha: [1.0]
    beta: [0.0]
    mtagA: ["none"]
    mtagB: ["none", "reorder"]
    tolerances:
      absolute: 0
      relative: 0
    post_operations:
      operations:
        - type: "A_Quant"
          params:
            a_quant_sf_len: ["1"]
            a_quant_sf_type: ["f32"]
            a_quant_zp_len: ["1"]
            a_quant_zp_type: ["f32"]

  # GEMV N=1: Matrix × Column vector

  - name: "bf16s8_gemv_n1"
    a_type: ["bf16"]
    b_type: ["s8"]
    c_type: ["bf16"]
    acc_type: ["s32"]
    storage_format: ["row-major"]
    transA: [false]
    transB: [false]
    m: [1, 6, 16, 32, 144, 288]  # Include various sizes
    n: [1]
    k: [64, 128, 512, 2048]
    alpha: [1.0]
    beta: [0.0]
    mtagA: ["none"]
    mtagB: ["none"]
    tolerances:
      absolute: 0
      relative: 0
    post_operations:
      operations:
        - type: "A_Quant"
          params:
            a_quant_sf_len: ["1", "m"]
            a_quant_sf_type: ["f32"]
            a_quant_zp_len: ["1", "m"]
            a_quant_zp_type: ["f32"]

  # LLM dimensions: batch sizes, hidden layer sizes

  - name: "bf16s8_llm_dims"
    a_type: ["bf16"]
    b_type: ["s8"]
    c_type: ["bf16"]
    acc_type: ["s32"]
    storage_format: ["row-major"]
    transA: [false]
    transB: [false]
    m: [1, 32, 128]  # Typical batch/sequence sizes
    n: [768, 1024, 3072, 4096]  # Common LLM hidden sizes
    k: [768, 1024, 2048]
    alpha: [1.0]
    beta: [0.0]
    mtagA: ["none"]
    mtagB: ["none", "reorder"]
    tolerances:
      absolute: 0
      relative: 0
    post_operations:
      operations:
        - type: "A_Quant"
          params:
            a_quant_sf_len: ["1", "m"]
            a_quant_sf_type: ["f32"]
            a_quant_zp_len: ["1", "m"]
            a_quant_zp_type: ["f32"]

  # Boundary conditions: values around MC, NC, KC, NR limits

  - name: "bf16s8_boundaries"
    a_type: ["bf16"]
    b_type: ["s8"]
    c_type: ["bf16"]
    acc_type: ["s32"]
    storage_format: ["row-major"]
    transA: [false]
    transB: [false, true]
    m: [1, 143, 144, 145, 287, 288]  # Around MC boundary
    n: [1, 15, 16, 63, 64, 65, 1023, 1024, 1025]  # Around NR and NC boundaries
    k: [1, 127, 128, 2047, 2048, 2049]  # Around KC boundary
    alpha: [1.0]
    beta: [0.0]
    mtagA: ["none"]
    mtagB: ["none"]
    tolerances:
      absolute: 0
      relative: 0
    post_operations:
      operations:
        - type: "A_Quant"
          params:
            a_quant_sf_len: ["1"]
            a_quant_sf_type: ["f32"]
            a_quant_zp_len: ["1"]
            a_quant_zp_type: ["f32"]

  # Edge cases: minimal sizes, prime numbers, varied alpha/beta

  - name: "bf16s8_edge_cases"
    a_type: ["bf16"]
    b_type: ["s8"]
    c_type: ["bf16"]
    acc_type: ["s32"]
    storage_format: ["row-major"]
    transA: [false]
    transB: [false]
    m: [1, 2, 7, 13]  # Minimal and primes
    n: [1, 2, 61]
    k: [1, 2, 61]
    alpha: [0.0, 1.0, -1.0, 2.5]
    beta: [0.0, 1.0, -2.0]
    mtagA: ["none"]
    mtagB: ["none"]
    tolerances:
      absolute: 0
      relative: 0
    post_operations:
      operations:
        - type: "A_Quant"
          params:
            a_quant_sf_len: ["1"]
            a_quant_sf_type: ["f32"]
            a_quant_zp_len: ["1"]
            a_quant_zp_type: ["f32"]

  # Leading dimension variations: minimal vs sparse strides

  - name: "bf16s8_ld_variations"
    a_type: ["bf16"]
    b_type: ["s8"]
    c_type: ["bf16"]
    acc_type: ["s32"]
    storage_format: ["row-major"]
    transA: [false]
    transB: [false]
    m: [6, 32]
    n: [64]
    k: [64]
    alpha: [1.0]
    beta: [0.0, 1.0]
    lda: [64, 128]  # Minimal and sparse
    ldb: [64, 128]
    ldc: [64, 128]
    mtagA: ["none"]
    mtagB: ["none"]
    tolerances:
      absolute: 0
      relative: 0
    post_operations:
      operations:
        - type: "A_Quant"
          params:
            a_quant_sf_len: ["1"]
            a_quant_sf_type: ["f32"]
            a_quant_zp_len: ["1"]
            a_quant_zp_type: ["f32"]

  # Large scale: multiples of cache blocking parameters

  - name: "bf16s8_large_scale"
    a_type: ["bf16"]
    b_type: ["s8"]
    c_type: ["bf16"]
    acc_type: ["s32"]
    storage_format: ["row-major"]
    transA: [false]
    transB: [false]
    m: [576, 1152]  # 4*MC, 8*MC
    n: [512, 2048]  # 0.5*NC, 2*NC
    k: [512, 4096]  # 0.25*KC, 2*KC
    alpha: [1.0]
    beta: [0.0]
    mtagA: ["none"]
    mtagB: ["none", "reorder"]
    tolerances:
      absolute: 0
      relative: 0
    post_operations:
      operations:
        - type: "A_Quant"
          params:
            a_quant_sf_len: ["1"]
            a_quant_sf_type: ["f32"]
            a_quant_zp_len: ["1"]
            a_quant_zp_type: ["f32"]
