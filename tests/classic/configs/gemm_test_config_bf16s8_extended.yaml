    storage_format: ["row-major", "column-major"]
    transA: [false, true]
    transB: [false, true]
    m: [32, 64]
    n: [32, 64]
    k: [128, 256]
    # Values that maximize chance of s8 output overflow
    alpha: [64, 127, 128]  # Near s8 limits
    beta: [63, 126, 127]
    lda: [256]
    ldb: [256]
    ldc: 64
    mtagA: ["none"]
    mtagB: ["none"]
    post_operations:
      operations:
        - type: "A_Quant"
          params:
            a_quant_sf_len: ["m"]
            a_quant_sf_type: ["f32"]
            a_quant_zp_len: ["m"]
            a_quant_zp_type: ["f32"]
