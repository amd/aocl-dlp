    n: [1, 2, 4, 8, 16, 32, 64, 128]
    k: [1, 2, 4, 8, 16, 32, 64, 128]
    alpha: [1.0]
    beta: [0.0, 1.0]
    lda: [5, 64, 128]
    ldb: [5, 64, 128]
    ldc: [5, 64, 128]
    mtagA: ["none", "pack"]
    mtagB: ["none", "pack", "reorder"]
    tolerances:
      float: 1.0e-6
      bfloat16: 1.0e-2
      int8: 0

  # Critical regression baselines for BF16 (Test Set 2)
  - name: "regression_baseline_bf16"
    a_type: ["bf16"]
    b_type: ["bf16"]
    c_type: ["f32", "bf16"]
    acc_type: ["f32"]
    storage_format: ["row-major", "column-major"]
    transA: [false, true]
    transB: [false, true]
    m: [1, 2, 4, 8, 16, 32, 64, 128]
    n: [1, 2, 4, 8, 16, 32, 64, 128]
    k: [1, 2, 4, 8, 16, 32, 64, 128]
    alpha: [0.0, 1.0, -1.0]
    beta: [0.0, 1.0, -1.0]
    lda: [5, 64, 128]
    ldb: [5, 64, 128]
    ldc: [5, 64, 128]
    mtagA: ["none", "pack"]
    mtagB: ["none", "pack", "reorder"]
    tolerances:
      float: 1.0e-5
      bfloat16: 1.0e-3  # Strict BF16 tolerance for regression
      int8: 0

