    transA: [false, true]
    transB: [false, true]
    m: [6, 32, 64]  # Include kernel-specific size (6)
    n: [16, 32, 64]  # Include fringe sizes
    k: [4, 16, 32]   # Include VNNI-aligned
    alpha: [1.0]
    beta: [0.0, 1.0]
    lda: [64]
    ldb: [64]
    ldc: [64]
    mtagA: ["none", "pack"]
    mtagB: ["none", "pack", "reorder"]
    tolerances:
      float: 1.0e-6
      bfloat16: 1.0e-3
      int8: 0

