  # 17
  # Kernel-specific regression tests for known working configurations
  - name: "kernel_regression_f32_6x16"
    a_type: ["f32"]
    b_type: ["f32"]
    c_type: ["f32"]
    acc_type: ["f32"]
    storage_format: ["row-major"]
    transA: [false, true]
