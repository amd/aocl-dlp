  # Extended API regression matrix - tests all output type combinations (Test Set 3)
  - name: "api_regression_matrix_extended"
    a_type: ["u8", "s8"]
    b_type: ["s8", "s8"]
    c_type: ["s32", "f32", "bf16", "s8", "u8"]
    acc_type: ["s32"]
