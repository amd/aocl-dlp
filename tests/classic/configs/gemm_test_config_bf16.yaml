# GEMM BF16 Nightly Test Configuration
# Target: JIT code path coverage with strategic dimension selection
# Runtime: ~30-45 minutes
# Focus: BF16 data type with comprehensive JIT kernel coverage
#
# Architecture Parameters (ZEN4):
#   MC=144, NC=1024, KC=4096, MR=6, NR=64 (AVX512)
# Architecture Parameters (ZEN):
#   MC=144, NC=1024, KC=2048, MR=6, NR=64
#
# BF16 specifics:
#   - Internal accumulation in FP32 (acc_type)
#   - BF16→FP32 conversion on load
#   - FP32→BF16 or FP32 conversion on store (c_type)
#   - Same JIT kernel variants as FP32 (35 for AVX512)

gemm_tests:
  # ==========================================================================
  # Test Set 1: MR Fringe Variants - Test all 7 JIT kernel MR variants
  # Covers: M%6 ∈ {0,1,2,3,4,5} + mLoop testing
  # ==========================================================================
  - name: "bf16_mr_variants"
    a_type: ["bf16"]
    b_type: ["bf16"]
    c_type: ["f32"]  # Output as F32
    acc_type: ["f32"]  # Always accumulate in F32
    storage_format: ["row-major"]
    transA: [false]
    transB: [false]
    # M values to hit all MR variants: 1,2,3,4,5,6,7,12,13,144,145
    m: [1, 2, 3, 4, 5, 6, 7, 12, 13, 144, 145]
    n: [64]  # Standard NR
    k: [64]
    alpha: [1.0]
    beta: [0.0]
    mtagA: ["none"]
    mtagB: ["none"]
    tolerances:
      absolute: 0
      relative: 0

  # ==========================================================================
  # Test Set 2: NR Register Allocation Variants
  # Covers: All 5 AVX512 NR variants (nr=0,1,2,3,4) with masking
  # ==========================================================================
  - name: "bf16_nr_variants"
    a_type: ["bf16"]
    b_type: ["bf16"]
    c_type: ["f32"]
    acc_type: ["f32"]
    storage_format: ["row-major"]
    transA: [false]
    transB: [false]
    m: [6, 12]  # M%6=0 to isolate NR testing
    # N values to hit all NR register patterns (same as FP32)
    n: [1, 8, 15, 16, 24, 31, 32, 40, 47, 48, 56, 63, 64, 80, 128]
    k: [64]
    alpha: [1.0]
    beta: [0.0]
    mtagA: ["none"]
    mtagB: ["none"]
    tolerances:
      absolute: 0
      relative: 0

  # ==========================================================================
  # Test Set 3: K-loop Unroll and Remainder Handling
  # Covers: Main K-loop, kLeft path, KC boundaries (KC=4096 for ZEN4)
  # ==========================================================================
  - name: "bf16_k_unroll"
    a_type: ["bf16"]
    b_type: ["bf16"]
    c_type: ["f32"]
    acc_type: ["f32"]
    storage_format: ["row-major"]
    transA: [false]
    transB: [false]
    m: [6, 12]
    n: [64]
    # K values for BF16 (capped at 2048)
    #   Small: 1,2,3,4,5,7,8,9 (tests kLeft)
    k: [1, 2, 3, 4, 5, 7, 8, 9, 16, 64, 256, 1024, 2048]
    alpha: [1.0]
    beta: [0.0]
    mtagA: ["none"]
    mtagB: ["none"]
    tolerances:
      absolute: 0
      relative: 0

  # ==========================================================================
  # Test Set 4: Alpha/Beta Scaling Code Paths
  # Covers: scaleAlpha() and scaleBeta() conditionals and FMA paths
  # ==========================================================================
  - name: "bf16_alpha_beta_scaling"
    a_type: ["bf16"]
    b_type: ["bf16"]
    c_type: ["f32"]
    acc_type: ["f32"]
    storage_format: ["row-major"]
    transA: [false]
    transB: [false]
    m: [6, 12]
    n: [64, 65]  # 65 tests fringe masking
    k: [64]
    alpha: [0.0, 1.0, 2.0, -1.0]
    beta: [0.0, 1.0, 2.0, -1.0]
    mtagA: ["none"]
    mtagB: ["none"]
    tolerances:
      absolute: 0
      relative: 0

  # ==========================================================================
  # Test Set 5: Alpha/Beta Edge Cases with Non-Trivial Values
  # Covers: BF16 precision with non-power-of-2 scaling factors
  # ==========================================================================
  - name: "bf16_alpha_beta_edge_cases"
    a_type: ["bf16"]
    b_type: ["bf16"]
    c_type: ["f32"]
    acc_type: ["f32"]
    storage_format: ["row-major"]
    transA: [false]
    transB: [false]
    m: [6]
    n: [64]
    k: [64]
    # Integer-representable alpha/beta values
    alpha: [0, 1, 2, -1]
    beta: [0, 1, 2, -1]
    mtagA: ["none"]
    mtagB: ["none"]
    tolerances:
      absolute: 0
      relative: 0

  # ==========================================================================
  # Test Set 6: Output Type Variants (BF16 specific)
  # Covers: F32→BF16 conversion on store vs F32 output
  # ==========================================================================
  - name: "bf16_output_types"
    a_type: ["bf16"]
    b_type: ["bf16"]
    c_type: ["f32", "bf16"]
    acc_type: ["f32"]
    storage_format: ["row-major"]
    transA: [false]
    transB: [false]
    m: [6, 12, 144]
    n: [64, 128]
    k: [64, 1024, 2048]
    alpha: [1.0, 2.0]
    beta: [0.0, 1.0]
    mtagA: ["none"]
    mtagB: ["none"]
    tolerances:
      absolute: 0
      relative: 0

  # ==========================================================================
  # Test Set 7: Cache Blocking Boundaries (MC, NC, KC)
  # MC=144, NC=1024, KC=4096 for ZEN4
  # ==========================================================================
  - name: "bf16_cache_boundaries"
    a_type: ["bf16"]
    b_type: ["bf16"]
    c_type: ["f32"]
    acc_type: ["f32"]
    storage_format: ["row-major"]
    transA: [false]
    transB: [false]
    # MC boundaries (144): 1,6,143,144,145,287,288,289
    m: [1, 6, 143, 144, 145, 287, 288, 289]
    # NC boundaries (1024): 1,64,256,1023,1024,1025,2047,2048
    n: [1, 64, 256, 1023, 1024, 1025, 2047, 2048]
    # KC boundaries (capped at 2048): 1,2048
    k: [1, 2048]
    alpha: [1.0]
    beta: [0.0]
    mtagA: ["none"]
    mtagB: ["none"]
    tolerances:
      absolute: 0
      relative: 0

  # ==========================================================================
  # Test Set 8: Transpose Combinations
  # Covers: All 4 transpose combinations
  # ==========================================================================
  - name: "bf16_transpose"
    a_type: ["bf16"]
    b_type: ["bf16"]
    c_type: ["f32"]
    acc_type: ["f32"]
    storage_format: ["row-major"]
    transA: [false, true]
    transB: [false, true]
    m: [6, 12, 144]
    n: [64, 128]
    k: [64, 1024, 2048]
    alpha: [1.0]
    beta: [0.0]
    mtagA: ["none"]
    mtagB: ["none"]
    tolerances:
      absolute: 0
      relative: 0

  # ==========================================================================
  # Test Set 9: Matrix Reordering/Packing Combinations
  # Covers: mtagB variants (none, pack, reorder)
  # ==========================================================================
  - name: "bf16_mtag_combinations"
    a_type: ["bf16"]
    b_type: ["bf16"]
    c_type: ["f32"]
    acc_type: ["f32"]
    storage_format: ["row-major"]
    transA: [false]
    transB: [false, true]
    m: [6, 12, 144]
    n: [64, 128]
    k: [64, 1024, 2048]
    alpha: [1.0]
    beta: [0.0]
    mtagA: ["none"]
    mtagB: ["none", "pack", "reorder"]
    tolerances:
      absolute: 0
      relative: 0

  # ==========================================================================
  # Test Set 10: Edge Cases - Small dimensions and primes
  # ==========================================================================
  - name: "bf16_edge_cases"
    a_type: ["bf16"]
    b_type: ["bf16"]
    c_type: ["f32"]
    acc_type: ["f32"]
    storage_format: ["row-major"]
    transA: [false]
    transB: [false]
    # Small dimensions and primes
    m: [1, 7, 11, 13, 17, 19, 23, 29, 31]
    n: [1, 7, 11, 13, 17, 19, 23, 29, 31]
    k: [1, 7, 11, 13, 17, 19, 23, 29, 31]
    alpha: [1.0, 3.0]
    beta: [0.0]
    mtagA: ["none"]
    mtagB: ["none"]
    tolerances:
      absolute: 0
      relative: 0
