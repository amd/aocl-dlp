# GEMM BF16 Weekly Test Configuration
# Target: Comprehensive systematic sweep of dimension space
# Focus: BF16 data type with exhaustive dimension coverage
#
# Architecture Parameters (ZEN4):
#   MC=144, NC=1024, KC=4096, MR=6, NR=64 (AVX512)

gemm_tests:
  # ==========================================================================
  # Test Set 1: Systematic M Sweep
  # ==========================================================================
  - name: "bf16_extended_m_sweep"
    a_type: ["bf16"]
    b_type: ["bf16"]
    c_type: ["f32"]
    acc_type: ["f32"]
    storage_format: ["row-major"]
    transA: [false]
    transB: [false]
    m:
      lb: 1
      ub: 289
      step: 4
    n: [64, 128, 256, 1024]
    k: [64, 1024]
    alpha: [1.0]
    beta: [0.0, 1.0]
    mtagA: ["none"]
    mtagB: ["none"]
    tolerances:
      float: 1.0e-5
      bfloat16: 1.0e-2

  # ==========================================================================
  # Test Set 2: Systematic N Sweep - Small Range
  # ==========================================================================
  - name: "bf16_extended_n_sweep_small"
    a_type: ["bf16"]
    b_type: ["bf16"]
    c_type: ["f32"]
    acc_type: ["f32"]
    storage_format: ["row-major"]
    transA: [false, true]
    transB: [false, true]
    m: [6, 12, 144]
    n:
      lb: 1
      ub: 256
      step: 32
    k: [64, 1024, 2048]
    alpha: [1.0]
    beta: [0.0, 1.0]
    mtagA: ["none"]
    mtagB: ["none"]
    tolerances:
      float: 1.0e-5
      bfloat16: 1.0e-2

  # ==========================================================================
  # Test Set 3: Systematic N Sweep - Large Range
  # ==========================================================================
  - name: "bf16_extended_n_sweep_large"
    a_type: ["bf16"]
    b_type: ["bf16"]
    c_type: ["f32"]
    acc_type: ["f32"]
    storage_format: ["row-major"]
    transA: [false]
    transB: [false, true]
    m: [6, 144, 288]
    n:
      lb: 256
      ub: 2048
      step: 200
    k: [64, 1024, 2048]
    alpha: [1.0]
    beta: [0.0, 1.0]
    mtagA: ["none"]
    mtagB: ["none"]
    tolerances:
      float: 1.0e-5
      bfloat16: 1.0e-2

  # ==========================================================================
  # Test Set 4: Systematic K Sweep
  # ==========================================================================
  - name: "bf16_extended_k_sweep"
    a_type: ["bf16"]
    b_type: ["bf16"]
    c_type: ["f32"]
    acc_type: ["f32"]
    storage_format: ["row-major"]
    transA: [false, true]
    transB: [false, true]
    m: [6, 12, 144, 288]
    n: [64, 128, 256, 1024]
    k:
      lb: 1
      ub: 2048
      step: 200
    alpha: [1.0, -1.0]
    beta: [0.0, 1.0]
    mtagA: ["none"]
    mtagB: ["none", "reorder"]
    tolerances:
      float: 1.0e-5
      bfloat16: 1.0e-2

  # ==========================================================================
  # Test Set 5: Combined Boundaries
  # ==========================================================================
  - name: "bf16_extended_combined_boundaries"
    a_type: ["bf16"]
    b_type: ["bf16"]
    c_type: ["f32"]
    acc_type: ["f32"]
    storage_format: ["row-major"]
    transA: [false, true]
    transB: [false, true]
    m: [1, 143, 144, 145, 287, 288]
    n: [64, 1023, 1024, 1025]
    k: [1, 2048]
    alpha: [1.0, -1.0]
    beta: [0.0, 1.0]
    mtagA: ["none"]
    mtagB: ["none"]
    tolerances:
      float: 1.0e-5
      bfloat16: 1.0e-2

  # ==========================================================================
  # Test Set 6: Alpha/Beta Comprehensive
  # ==========================================================================
  - name: "bf16_extended_alpha_beta_comprehensive"
    a_type: ["bf16"]
    b_type: ["bf16"]
    c_type: ["f32"]
    acc_type: ["f32"]
    storage_format: ["row-major"]
    transA: [false]
    transB: [false]
    m: [6, 144, 288]
    n: [64, 128, 1024]
    k: [64, 1024, 2048]
    alpha: [0.0, 1.0, -1.0, 2.0]
    beta: [0.0, 1.0, -1.0]
    mtagA: ["none"]
    mtagB: ["none"]
    tolerances:
      float: 1.0e-5
      bfloat16: 1.0e-2

  # ==========================================================================
  # Test Set 7: Output Type Comprehensive (BF16 specific)
  # ==========================================================================
  - name: "bf16_extended_output_types_comprehensive"
    a_type: ["bf16"]
    b_type: ["bf16"]
    c_type: ["f32", "bf16"]
    acc_type: ["f32"]
    storage_format: ["row-major"]
    transA: [false, true]
    transB: [false, true]
    m: [1, 6, 12, 72, 144, 216, 288]
    n: [64, 128, 256, 1024]
    k: [64, 1024, 2048]
    alpha: [1.0, 3.0]
    beta: [0.0, 1.0]
    mtagA: ["none"]
    mtagB: ["none", "reorder"]
    tolerances:
      float: 1.0e-5
      bfloat16: 1.0e-2
